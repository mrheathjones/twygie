<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twygie — Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04070c;--surface:rgba(10,18,32,.96);--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.88);--muted:rgba(255,255,255,.4);--gold:#c8a84b}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);user-select:none}

#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:linear-gradient(to bottom,var(--bg) 80%,transparent)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.hbtn{padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:100px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.hbtn:hover{background:rgba(255,255,255,.1);color:var(--text)}
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--muted);transition:opacity .4s}
#loading.fade{opacity:0;pointer-events:none}#loading.gone{display:none}

/* Timeline area */
#tl-scroll{position:fixed;top:0;left:0;right:56px;bottom:56px;overflow:hidden}
#tl-inner{position:relative;height:100%;will-change:transform}
#tl-line{position:absolute;left:0;right:0;top:68%;height:2px;background:linear-gradient(to right,transparent 20px,rgba(200,168,75,.2) 60px,rgba(200,168,75,.2) calc(100% - 60px),transparent)}

.yr{position:absolute;top:68%;transform:translateX(-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center}
.yr-tick{width:1px;height:10px;background:rgba(200,168,75,.15);margin-top:6px}
.yr-label{font-size:.58rem;color:rgba(200,168,75,.35);margin-top:3px;letter-spacing:.04em;white-space:nowrap}
.yr.decade .yr-tick{height:18px;background:rgba(200,168,75,.4)}
.yr.decade .yr-label{font-size:.72rem;color:var(--gold);font-weight:600;opacity:.65}
.yr.month .yr-tick{height:6px;background:rgba(200,168,75,.1)}
.yr.month .yr-label{font-size:.48rem;color:rgba(200,168,75,.25)}

.tl-node{position:absolute;transform:translateX(-50%);cursor:pointer;z-index:2;display:flex;flex-direction:column;align-items:center;gap:2px}
.tl-node:hover{z-index:20}
.tl-dot{width:42px;height:42px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:transform .2s,box-shadow .2s}
.tl-dot img{width:100%;height:100%;object-fit:cover}
.tl-node:hover .tl-dot{transform:scale(1.2);box-shadow:0 0 24px rgba(200,168,75,.4)}
.tl-nm{font-size:.56rem;color:var(--muted);white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;text-align:center}
.tl-conn{width:1px;opacity:.25;margin-top:-1px}

.tl-group{position:absolute;transform:translateX(-50%);cursor:pointer;z-index:3;display:flex;flex-direction:column;align-items:center;gap:2px}
.tl-group:hover{z-index:25}
.tl-badge{width:46px;height:46px;border-radius:50%;background:rgba(200,168,75,.18);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;color:var(--gold);transition:transform .2s,box-shadow .2s}
.tl-group:hover .tl-badge{transform:scale(1.15);box-shadow:0 0 28px rgba(200,168,75,.35);background:rgba(200,168,75,.3)}
.tl-stack{display:flex;margin-top:1px}.tl-sd{width:8px;height:8px;border-radius:50%;margin-left:-2px;border:1px solid rgba(0,0,0,.5)}.tl-sd:first-child{margin-left:0}

/* Popups */
.tl-popup{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.92);opacity:0;pointer-events:none;transition:all .18s;z-index:30;width:200px}
.tl-node:hover .tl-popup{opacity:1;transform:translateX(-50%) scale(1);pointer-events:all}
.tl-pop{background:rgba(6,12,24,.97);border:1px solid rgba(200,168,75,.2);border-radius:14px;padding:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,.7)}
.tl-pop::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:rgba(6,12,24,.97);border-right:1px solid rgba(200,168,75,.2);border-bottom:1px solid rgba(200,168,75,.2)}
.tl-pp{width:50px;height:50px;border-radius:50%;overflow:hidden;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600}
.tl-pp img{width:100%;height:100%;object-fit:cover}
.tl-pn{font-size:.86rem;font-weight:600;color:var(--text);text-align:center}
.tl-pr{font-size:.66rem;color:var(--gold);text-align:center;font-style:italic;margin-top:2px}
.tl-pd{font-size:.66rem;color:var(--muted);text-align:center;margin-top:4px}
.tl-pa{font-size:.6rem;color:var(--muted);text-align:center;margin-top:1px}
.tl-ps{font-size:.6rem;color:rgba(255,255,255,.3);font-style:italic;text-align:center;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.tl-gpop{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.92);opacity:0;pointer-events:none;transition:all .18s;z-index:30;width:230px}
.tl-group:hover .tl-gpop{opacity:1;transform:translateX(-50%) scale(1);pointer-events:all}
.tl-gpi{background:rgba(6,12,24,.97);border:1px solid rgba(200,168,75,.2);border-radius:14px;padding:8px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,.7);max-height:300px;overflow-y:auto}
.tl-gpi::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:rgba(6,12,24,.97);border-right:1px solid rgba(200,168,75,.2);border-bottom:1px solid rgba(200,168,75,.2)}
.tl-gc{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.tl-gc:hover{background:rgba(255,255,255,.05)}
.tl-gc+.tl-gc{border-top:1px solid rgba(255,255,255,.04)}
.tl-gc-p{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:600}
.tl-gc-p img{width:100%;height:100%;object-fit:cover}
.tl-gc-n{font-size:.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-gc-r{font-size:.58rem;color:var(--gold);font-style:italic}
.tl-gc-m{font-size:.56rem;color:var(--muted);margin-top:1px}

/* ─── SCROLL BARS ─── */
.scroll-bar{position:fixed;display:flex;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent;z-index:200;cursor:pointer;border-radius:12px;transition:background .12s}
.scroll-bar:hover,.scroll-bar.active{background:rgba(255,255,255,.03)}
.scroll-bar .sb-lines{display:flex;pointer-events:none;user-select:none}
.sb-line{border-radius:99px;background:rgba(255,255,255,.08);transition:background-color .08s linear,transform .08s linear,box-shadow .08s linear;will-change:background-color,transform}

/* Vertical bar (right) — ZOOM */
#v-bar{top:50%;right:12px;transform:translateY(-50%);width:40px;padding:12px 0;flex-direction:column;align-items:center}
#v-bar .sb-lines{flex-direction:column;gap:5px;align-items:center}
#v-bar .sb-line{width:14px;height:2px}

/* Horizontal bar (bottom) — SCROLL */
#h-bar{bottom:12px;left:50%;transform:translateX(-50%);height:40px;padding:0 12px;align-items:center}
#h-bar .sb-lines{flex-direction:row;gap:5px;align-items:center}
#h-bar .sb-line{width:2px;height:14px}

/* Labels */
#zoom-label{position:fixed;bottom:56px;right:12px;z-index:50;font-size:.55rem;color:rgba(200,168,75,.4);text-align:center;width:40px;letter-spacing:.06em;text-transform:uppercase}
#legend{position:fixed;bottom:56px;left:14px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;backdrop-filter:blur(12px);display:flex;gap:10px;flex-wrap:wrap;font-size:.6rem}
.leg-i{display:flex;align-items:center;gap:4px;color:var(--muted)}.leg-d{width:8px;height:8px;border-radius:50%}
#empty{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;color:var(--muted);font-size:.95rem}
#empty.show{display:flex}
</style>
</head>
<body>
<div id="loading">Loading timeline…</div>
<div id="hdr">
  <div class="logo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/><path d="M12 16C12 13 9 11 5 12"/><path d="M12 16C12 13 15 11 19 12"/></svg> Twygie Timeline</div>
  <a class="hbtn" href="/app">← Back to Tree</a>
</div>
<div id="tl-scroll"><div id="tl-inner"><div id="tl-line"></div></div></div>

<!-- Vertical bar = ZOOM -->
<div class="scroll-bar" id="v-bar"><div class="sb-lines" id="vb-lines"></div></div>
<div id="zoom-label">Decade</div>

<!-- Horizontal bar = SCROLL -->
<div class="scroll-bar" id="h-bar"><div class="sb-lines" id="hb-lines"></div></div>

<div id="legend"></div>
<div id="empty">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"><path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/></svg>
  <div>No birth years recorded yet.</div>
  <a class="hbtn" href="/app" style="margin-top:8px">← Back to Tree</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBwtDMGEIphvwvq319MZIr62C32fvSSe-4",authDomain:"twygie.firebaseapp.com",projectId:"twygie",storageBucket:"twygie.firebasestorage.app",messagingSenderId:"654053569477",appId:"1:654053569477:web:9296f441c285686d7c11ac"});
const auth=firebase.auth(),db=firebase.firestore();
let P=[],byId={},currentUser=null,youngAge=17;
const NC={you:'#f0efeb',spouse:'#e8a838',parent:'#7ab8e8',child:'#6ecb8a',sibling:'#e87a5a',grandparent:'#b89ae8',extended:'#e8c87a',deceased:'#6b9ec2',young:'#4ecdb4',default:'#f0b845'};

async function deriveKey(uid){const e=new TextEncoder();const km=await crypto.subtle.importKey('raw',e.encode(uid),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:e.encode('twygie-encryption-v1'),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function decrypt(key,b64){const bin=atob(b64);const raw=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)raw[i]=bin.charCodeAt(i);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},key,raw.slice(12));return JSON.parse(new TextDecoder().decode(dec))}
function fullName(p){return p.name||[(p.firstName||''),(p.lastName||'')].filter(Boolean).join(' ')||'Unknown'}
function initials(p){return fullName(p).split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function calcAge(p){const by=parseInt(p.dob&&p.dob.year)||p.birth||null;if(!by)return null;const dy=parseInt(p.dod&&p.dod.year)||p.death||null;return(dy||new Date().getFullYear())-by}
function genderedRel(b,g){const m=g==='male',f=g==='female';const map={'Parent':m?'Father':f?'Mother':'Parent','Child':m?'Son':f?'Daughter':'Child','Sibling':m?'Brother':f?'Sister':'Sibling','Spouse':m?'Husband':f?'Wife':'Partner','Grandparent':m?'Grandfather':f?'Grandmother':'Grandparent','Grandchild':m?'Grandson':f?'Granddaughter':'Grandchild'};return map[b]||b}
function getRelToYou(id){const you=P.find(p=>p.isYou);if(!you||id===you.id)return'';const p=byId[id];if(!p)return'';if((p.parents||[]).includes(you.id))return genderedRel('Child',p.gender);if((you.parents||[]).includes(id))return genderedRel('Parent',p.gender);if(p.spouseOf===you.id||you.spouseOf===id)return genderedRel('Spouse',p.gender);const ycl=you.customLinks&&you.customLinks[id];if(ycl)return typeof ycl==='string'?ycl:ycl.label;const pcl=p.customLinks&&p.customLinks[you.id];if(pcl)return typeof pcl==='string'?pcl:pcl.label;if(p.relLabel)return p.relLabel;const myP=new Set(you.parents||[]);if(myP.size&&(p.parents||[]).some(pp=>myP.has(pp)))return genderedRel('Sibling',p.gender);return''}
function relCat(p){if(p.isYou)return'you';if(p.death||(p.dod&&p.dod.year))return'deceased';const by=parseInt(p.dob&&p.dob.year)||p.birth||0;if(by>0&&(new Date().getFullYear()-by)<=youngAge)return'young';const you=P.find(x=>x.isYou);if(!you)return'default';if((p.parents||[]).includes(you.id))return'child';if((you.parents||[]).includes(p.id))return'parent';if(p.spouseOf===you.id||you.spouseOf===p.id)return'spouse';const myP=new Set(you.parents||[]);if(myP.size&&(p.parents||[]).some(pp=>myP.has(pp)))return'sibling';if((you.customLinks&&you.customLinks[p.id])||(p.customLinks&&p.customLinks[you.id]))return'extended';return'default'}
function col(p){return NC[relCat(p)]||NC.default}

// ─── TIMELINE STATE ───
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let scrollPos=0; // 0-1 horizontal position
let zoomLevel=0.3; // 0=overview, 1=month-level
let minY=1950, maxY=2030, byYearCount={};

// Zoom → pixels per year
function yearPx(){
  // 0 → 15px/yr (overview), 0.3 → 50px/yr (decade), 0.6 → 200px/yr (year), 1.0 → 800px/yr (month)
  return Math.round(15*Math.pow(800/15, zoomLevel));
}

function xOf(year,month){
  const px=yearPx();
  const base=(year-minY)*px;
  if(month!=null) return 100+base+(month/12)*px;
  return 100+base;
}

function renderTimeline(){
  const inner=document.getElementById('tl-inner');
  const curYr=new Date().getFullYear();
  const you=P.find(p=>p.isYou);
  const entries=P.filter(p=>(parseInt(p.dob&&p.dob.year)||p.birth||0)>0);
  if(!entries.length){document.getElementById('empty').classList.add('show');return}

  const bys=entries.map(p=>parseInt(p.dob&&p.dob.year)||p.birth);
  minY=Math.min(...bys)-2; maxY=Math.max(curYr,...bys)+2;
  byYearCount={};entries.forEach(p=>{const by=parseInt(p.dob&&p.dob.year)||p.birth;byYearCount[by]=(byYearCount[by]||0)+1});

  const px=yearPx();
  const totalW=200+(maxY-minY)*px;
  inner.style.width=totalW+'px';

  let html='';

  // ── Markers based on zoom ──
  const showMonths=px>=150; // show month ticks when zoomed in enough
  const showYears=px>=30;   // show year ticks
  for(let y=minY;y<=maxY;y++){
    const iD=y%10===0;
    if(!showYears&&!iD) continue;
    const x=xOf(y);
    html+=`<div class="yr${iD?' decade':''}" style="left:${x}px"><div class="yr-tick"></div><div class="yr-label">${y}</div></div>`;
    // Month subdivisions
    if(showMonths){
      for(let m=1;m<12;m++){
        const mx=xOf(y,m);
        html+=`<div class="yr month" style="left:${mx}px"><div class="yr-tick"></div><div class="yr-label">${MONTHS[m]}</div></div>`;
      }
    }
  }

  // ── Group entries by birth year ──
  const byYear={};entries.forEach(p=>{const by=parseInt(p.dob&&p.dob.year)||p.birth;if(!byYear[by])byYear[by]=[];byYear[by].push(p)});

  Object.keys(byYear).sort((a,b)=>a-b).forEach(year=>{
    const ms=byYear[year],x=xOf(parseInt(year));

    if(ms.length===1){
      const p=ms[0],c=col(p),rel=p.isYou?'You':getRelToYou(p.id),age=calcAge(p),nm=fullName(p);
      const dy=parseInt(p.dod&&p.dod.year)||p.death||0;
      const story=(p.note&&!p.note.includes('Tap Edit'))?p.note:'';
      const dot=p.photo?`<img src="${p.photo}"/>`:`<span>${initials(p)}</span>`;
      let ds=`${year}`;if(dy)ds+=` – ${dy}`;
      const ag=age!=null?(dy?`Lived ${age} years`:`Age ${age}`):'';
      const pp=p.photo?`<div class="tl-pp" style="background:${c}"><img src="${p.photo}"/></div>`:`<div class="tl-pp" style="background:${c};color:#04070c">${initials(p)}</div>`;

      html+=`<div class="tl-node" style="left:${x}px;bottom:32%" onclick="window.location.href='/app#node-${p.id}'">
        <div class="tl-popup"><div class="tl-pop">${pp}<div class="tl-pn">${nm}</div>${rel?`<div class="tl-pr">${rel}</div>`:''}<div class="tl-pd">${ds}</div>${ag?`<div class="tl-pa">${ag}</div>`:''}${story?`<div class="tl-ps">${story}</div>`:''}</div></div>
        <div class="tl-dot" style="background:${c};color:#04070c">${dot}</div>
        <div class="tl-nm">${nm.split(' ')[0]}</div>
        <div class="tl-conn" style="background:${c};height:10px"></div>
      </div>`;
    } else {
      const sd=ms.slice(0,5).map(p=>`<div class="tl-sd" style="background:${col(p)}"></div>`).join('');
      let cards='';
      ms.forEach(p=>{const c=col(p),rel=p.isYou?'You':getRelToYou(p.id),age=calcAge(p),nm=fullName(p);
        const dy=parseInt(p.dod&&p.dod.year)||p.death||0;let ds=`${year}`;if(dy)ds+=` – ${dy}`;
        const ag=age!=null?(dy?`${age} yrs`:`Age ${age}`):'';
        const ph=p.photo?`<div class="tl-gc-p" style="background:${c}"><img src="${p.photo}"/></div>`:`<div class="tl-gc-p" style="background:${c};color:#04070c">${initials(p)}</div>`;
        cards+=`<div class="tl-gc" onclick="event.stopPropagation();window.location.href='/app#node-${p.id}'">${ph}<div style="flex:1;min-width:0"><div class="tl-gc-n">${nm}</div>${rel?`<div class="tl-gc-r">${rel}</div>`:''}<div class="tl-gc-m">${ds}${ag?' · '+ag:''}</div></div></div>`});

      html+=`<div class="tl-group" style="left:${x}px;bottom:32%">
        <div class="tl-gpop"><div class="tl-gpi">${cards}</div></div>
        <div class="tl-badge">${ms.length}</div>
        <div class="tl-stack">${sd}</div>
        <div class="tl-conn" style="background:var(--gold);height:10px;opacity:.3"></div>
      </div>`;
    }
  });

  inner.innerHTML=`<div id="tl-line"></div>${html}`;

  // Legend
  const cats=new Set(entries.map(p=>relCat(p)));
  const cl={you:'You',spouse:'Spouse',parent:'Parent',child:'Child',sibling:'Sibling',grandparent:'Grandparent',extended:'Extended',deceased:'Deceased',young:'Young',default:'Other'};
  let lh='';cats.forEach(c=>{lh+=`<div class="leg-i"><div class="leg-d" style="background:${NC[c]}"></div>${cl[c]||c}</div>`});
  document.getElementById('legend').innerHTML=lh;

  applyScroll();
}

function applyScroll(){
  const inner=document.getElementById('tl-inner');
  const area=document.getElementById('tl-scroll');
  const totalW=parseFloat(inner.style.width)||1;
  const viewW=area.clientWidth;
  const maxOffset=Math.max(0,totalW-viewW);
  const offset=-scrollPos*maxOffset;
  inner.style.transform=`translateX(${offset}px)`;
}

// ─── SCROLL BARS ───
const BAR_N=32;
const GLOW='0 0 8px rgba(200,168,75,.2)';
let vBars=[],hBars=[];

function buildBars(){
  const vc=document.getElementById('vb-lines'),hc=document.getElementById('hb-lines');
  vc.innerHTML='';hc.innerHTML='';vBars=[];hBars=[];
  for(let i=0;i<BAR_N;i++){
    const vb=document.createElement('div');vb.className='sb-line';vc.appendChild(vb);vBars.push(vb);
    const hb=document.createElement('div');hb.className='sb-line';hc.appendChild(hb);hBars.push(hb);
  }
}

function renderBars(){
  const maxC=Math.max(1,...Object.values(byYearCount));
  const span=maxY-minY||1;

  // Horizontal bar — position indicator
  const hActive=scrollPos*(hBars.length-1);
  hBars.forEach((bar,i)=>{
    const dist=Math.abs(i-hActive);
    const posOp=Math.min(.9,Math.max(.06,1-dist*.17));
    const barYear=Math.round(minY+(i/(hBars.length-1))*span);
    let dens=0;for(let y=barYear-1;y<=barYear+1;y++)dens+=byYearCount[y]||0;
    const densOp=dens>0?Math.min(.4,.1+dens/maxC*.3):0;
    const op=Math.min(1,posOp+densOp);
    const sc=1+Math.max(0,.2-dist*.025);
    if(dens>0&&dist>2){bar.style.backgroundColor=`rgba(200,168,75,${densOp+.06})`}
    else{bar.style.backgroundColor=`rgba(255,255,255,${op})`}
    bar.style.transform=`scaleY(${sc})`;
    bar.style.boxShadow=dist<.8?GLOW:'none';
  });

  // Vertical bar — zoom level indicator
  const vActive=zoomLevel*(vBars.length-1);
  vBars.forEach((bar,i)=>{
    const dist=Math.abs(i-vActive);
    const op=Math.min(.9,Math.max(.06,1-dist*.17));
    const sc=1+Math.max(0,.2-dist*.025);
    bar.style.backgroundColor=`rgba(200,168,75,${op})`;
    bar.style.transform=`scaleX(${sc})`;
    bar.style.boxShadow=dist<.8?GLOW:'none';
  });
}

// ─── BAR INTERACTION ───
function setupBar(el, axis, onDrag){
  let active=false;
  const getProgress=(e)=>{
    const r=el.getBoundingClientRect();
    if(axis==='y') return Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
    return Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  };
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);active=true;el.classList.add('active');onDrag(getProgress(e))});
  el.addEventListener('pointermove',e=>{if(!active)return;e.preventDefault();onDrag(getProgress(e))});
  el.addEventListener('pointerup',()=>{active=false;el.classList.remove('active')});
  el.addEventListener('pointercancel',()=>{active=false;el.classList.remove('active')});
  el.addEventListener('lostpointercapture',()=>{active=false;el.classList.remove('active')});
}

// Horizontal bar → scroll position
setupBar(document.getElementById('h-bar'),'x',p=>{
  scrollPos=p;
  applyScroll();
  renderBars();
});

// Vertical bar → zoom level
setupBar(document.getElementById('v-bar'),'y',p=>{
  // Save center year before zoom
  const area=document.getElementById('tl-scroll');
  const inner=document.getElementById('tl-inner');
  const totalW=parseFloat(inner.style.width)||1;
  const viewW=area.clientWidth;
  const centerX=scrollPos*Math.max(0,totalW-viewW)+viewW/2;
  const centerYear=minY+(centerX-100)/yearPx();

  zoomLevel=p;
  updateZoomLabel();
  renderTimeline();

  // Restore center year after re-render
  const newPx=yearPx();
  const newTotalW=200+(maxY-minY)*newPx;
  const newCenterX=100+(centerYear-minY)*newPx;
  const newMaxOffset=Math.max(0,newTotalW-viewW);
  scrollPos=newMaxOffset>0?Math.min(1,Math.max(0,(newCenterX-viewW/2)/newMaxOffset)):0;
  applyScroll();
  renderBars();
});

function updateZoomLabel(){
  const px=yearPx();
  const label=document.getElementById('zoom-label');
  if(px>=400) label.textContent='Month';
  else if(px>=120) label.textContent='Year';
  else if(px>=35) label.textContent='Decade';
  else label.textContent='Overview';
}

// ─── INITIAL SCROLL TO isYou ───
function scrollToYou(){
  const you=P.find(p=>p.isYou);if(!you)return;
  const yby=parseInt(you.dob&&you.dob.year)||you.birth||0;if(!yby)return;
  const inner=document.getElementById('tl-inner');
  const area=document.getElementById('tl-scroll');
  const totalW=parseFloat(inner.style.width)||1;
  const viewW=area.clientWidth;
  const targetX=xOf(yby);
  const maxOffset=Math.max(0,totalW-viewW);
  scrollPos=maxOffset>0?Math.min(1,Math.max(0,(targetX-viewW/2)/maxOffset)):0;
  applyScroll();
}

// ─── AUTH + LOAD ───
auth.onAuthStateChanged(async user=>{
  if(!user){window.location.href='login.html';return}
  currentUser=user;
  try{
    const ss=await db.collection('userSettings').doc(user.uid).get();
    if(ss.exists){const d=ss.data();if(d.nodeColors)Object.assign(NC,d.nodeColors);if(d.youngAge!=null)youngAge=parseInt(d.youngAge)||17}
    const snap=await db.collection('familyTrees').doc(user.uid).get();
    if(snap.exists){const d=snap.data();if(d.encryptedData){const key=await deriveKey(user.uid);P=await decrypt(key,d.encryptedData)}else if(d.people&&d.people.length)P=d.people}
    byId={};P.forEach(p=>{if(!p.customLinks)p.customLinks={};byId[p.id]=p});
    buildBars();
    renderTimeline();
    scrollToYou();
    renderBars();
    updateZoomLabel();
  }catch(e){console.error('Failed:',e);document.getElementById('empty').classList.add('show')}
  const ld=document.getElementById('loading');ld.classList.add('fade');setTimeout(()=>ld.classList.add('gone'),400);
});
