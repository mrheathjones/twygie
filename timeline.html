<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twygie — Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/timeline.css">
</head>
<body>
<div id="atm" style="position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 58% 72% at 50% 46%,rgba(52,26,6,.65) 0%,transparent 100%),radial-gradient(ellipse 30% 35% at 50% 10%,rgba(10,5,2,.6) 0%,transparent 100%)"></div>
<div id="loading">Loading timeline…</div>
<div id="hdr">
  <div class="logo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/><path d="M12 16C12 13 9 11 5 12"/><path d="M12 16C12 13 15 11 19 12"/></svg> Twygie Timeline</div>
  <div class="hdr-btns">
    <button id="tl-missing-btn" class="hbtn" style="display:none;color:var(--gold);border-color:rgba(200,168,75,.25);background:rgba(200,168,75,.1)">
      <span id="tl-missing-count">0</span> Missing Twygs
    </button>
    <button class="hbtn" id="btn-tl-reset">Reset</button>
    <a class="hbtn" href="/app">← Back to Tree</a>
  </div>
</div>
<div id="tl-scroll"><div id="tl-inner"><div id="tl-line"></div></div></div>

<!-- Detail Modal -->
<div id="detail-bg">
  <div id="detail-card"></div>
</div>

<!-- Missing Twygs Modal -->
<div id="missing-bg" style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center">
  <div id="missing-card" style="width:480px;max-height:65vh;overflow-y:auto;background:rgba(8,14,26,.97);border:1px solid var(--border);border-radius:16px;padding:24px 28px;backdrop-filter:blur(16px);box-shadow:0 16px 48px rgba(0,0,0,.6)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:1rem;font-weight:600;color:var(--text)">Pick up your Twygs</div>
      <button onclick="closeMissing()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px">✕</button>
    </div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:16px">We think you dropped something — add birthdates so they show up on the timeline.</div>
    <div id="tl-missing-list" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>

<!-- Vertical bar = ZOOM -->
<div class="scroll-bar" id="v-bar"><div class="sb-lines" id="vb-lines"></div></div>
<div id="zoom-label">Decade</div>

<!-- Horizontal bar = SCROLL -->
<div class="scroll-bar" id="h-bar"><div class="sb-lines" id="hb-lines"></div><div id="you-tick"></div></div>

<div id="legend"></div>
<div id="empty">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"><path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/></svg>
  <div>No birth years recorded yet.</div>
  <a class="hbtn" href="/app" style="margin-top:8px">← Back to Tree</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="js/timeline.js"></script>
</body>
</html>
