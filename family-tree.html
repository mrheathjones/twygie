<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twygie</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04070c;--border:rgba(255,255,255,0.09);--text:#ddd8cc;--muted:rgba(221,216,204,0.42);--gold:#c8a84b;--green:rgba(100,200,140,.8)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text)}

/* LOADING */
#loading{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s}
#loading.fade{opacity:0;pointer-events:none}
#loading.gone{display:none}
.load-ring{width:40px;height:40px;border-radius:50%;border:2px solid rgba(200,168,75,.15);border-top-color:rgba(200,168,75,.7);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:.82rem;color:var(--muted);letter-spacing:.04em}

/* ATMOSPHERE */
#atm{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 58% 72% at 50% 46%,rgba(52,26,6,.65) 0%,transparent 100%),
    radial-gradient(ellipse 30% 35% at 50% 10%,rgba(10,5,2,.6) 0%,transparent 100%)}

/* TREE */
#wrap{position:fixed;inset:0;z-index:1;user-select:none}
#svg{width:100%;height:100%;overflow:visible}
#tg{transform-origin:0 0;will-change:transform}
#tg.anim{transition:transform .65s cubic-bezier(.4,0,.2,1)}

/* BRANCHES */
.br{fill:none;stroke-linecap:round;transition:opacity .3s}
.br.dim{opacity:.07}.br.lit{opacity:1}

/* NODES */
.nd{cursor:grab}
.nd.dragging{cursor:grabbing}
.nd .core{transition:filter .2s ease,opacity .3s}
.nd.dim .core,.nd.dim .hi,.nd.dim .lbl{opacity:.14}
.nd.sel .core{filter:brightness(1.7)}

/* PULSATE — opacity only, no translate */
@keyframes pa{0%,100%{opacity:.35}50%{opacity:.68}}
@keyframes pb{0%,100%{opacity:.25}50%{opacity:.52}}
@keyframes py{0%,100%{opacity:.50}50%{opacity:1.0}}
@keyframes pt{0%,100%{opacity:.32}50%{opacity:.62}}
.gp{transform-origin:center}
.gp.amber{animation:pa 3.4s ease-in-out infinite}
.gp.blue{animation:pb 4.3s ease-in-out infinite}
.gp.you{animation:py 2.5s ease-in-out infinite}
.gp.teal{animation:pt 3.8s ease-in-out infinite}
/* Hover: freeze animation + brighten */
.nd:hover .gp{animation:none!important;opacity:.9;filter:brightness(1.5)}
.nd:hover .core{filter:brightness(1.4)}

.nlbl{font-family:'Outfit',sans-serif;font-size:10.5px;font-weight:400;letter-spacing:.03em;fill:rgba(221,216,204,.52);pointer-events:none}
.nlbl.you{font-weight:600;fill:rgba(240,239,235,.85);font-size:11.5px}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;
  background:linear-gradient(to bottom,rgba(4,7,12,.92) 0%,transparent 100%);pointer-events:none}
#hdr>*{pointer-events:all}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;letter-spacing:.07em;color:var(--gold);display:flex;align-items:center;gap:9px}
#mcount{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .2s}
#mcount:hover{background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.25);color:var(--gold)}
#mcount strong{color:var(--text);font-weight:600}
.hbtns{display:flex;align-items:center;gap:8px}
.hbtn{padding:6px 15px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s}
.hbtn:hover{background:rgba(200,168,75,.12);border-color:rgba(200,168,75,.28);color:var(--gold)}
.hbtn.acc{background:var(--gold);color:#04070c;border-color:transparent;font-weight:600}
.hbtn.acc:hover{background:#d4b454}
#save-ind{font-size:.72rem;color:var(--muted);opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:5px}
#save-ind.show{opacity:1}
.uavatar{width:30px;height:30px;border-radius:50%;background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.3);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;color:var(--gold);cursor:pointer;overflow:hidden}
.uavatar img{width:100%;height:100%;object-fit:cover}

/* OVERLAY CARD */
#card{position:fixed;z-index:300;top:50%;left:50%;transform:translate(-50%,-50%) scale(.94);
  width:min(460px,90vw);max-height:min(600px,85vh);display:flex;flex-direction:column;border-radius:20px;
  background:rgba(6,12,22,.75);backdrop-filter:blur(30px) saturate(1.4);-webkit-backdrop-filter:blur(30px) saturate(1.4);
  border:1px solid rgba(255,255,255,.13);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 30px 70px rgba(0,0,0,.55);
  opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
#card.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.ctop{padding:20px 22px 16px;position:relative;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:flex-start;gap:14px}
.ccls{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:rgba(221,216,204,.5);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ccls:hover{background:rgba(255,255,255,.12);color:var(--text)}
.cavatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600}
.cavatar img{width:100%;height:100%;object-fit:cover}
.cmeta{flex:1;min-width:0;padding-right:28px}
.cbar{height:3px;border-radius:3px;margin-bottom:10px;width:34px}
.cname{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--text);line-height:1.15;margin-bottom:3px}
.cdob{font-size:.82rem;color:var(--muted);margin-bottom:2px}
.cplace{font-size:.78rem;color:rgba(200,168,75,.62);font-style:italic}
.crel-badge{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:20px;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;background:rgba(100,200,140,.1);border:1px solid rgba(100,200,140,.2);color:rgba(120,220,160,.8)}
.cbody{flex:1;overflow-y:auto;padding:14px 22px 18px}
.cbody::-webkit-scrollbar{width:2px}
.cbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.csec{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:8px;margin-top:14px}
.csec:first-child{margin-top:0}
.cbio{font-size:.88rem;line-height:1.72;color:rgba(221,216,204,.74)}
.frow{display:flex;flex-wrap:wrap;gap:6px}
.fchip{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;flex:1;min-width:140px}
.fchip:hover{background:rgba(255,255,255,.09)}
.fchip-photo{width:22px;height:22px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.08)}
.fchip-photo img{width:100%;height:100%;object-fit:cover}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fi2{flex:1;min-width:0}
.fn2{font-size:.83rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frel{font-size:.68rem;color:var(--muted);font-style:italic}
.fyr{font-size:.72rem;color:var(--muted);flex-shrink:0}
.card-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-family:'Outfit',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s;border:1px solid}
.btn-edit{background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.25);color:rgba(200,168,75,.85)}
.btn-edit:hover{background:rgba(200,168,75,.18);color:var(--gold)}
.btn-twyg{background:rgba(100,180,120,.08);border-color:rgba(100,180,120,.2);color:rgba(100,200,140,.75)}
.btn-twyg:hover{background:rgba(100,180,120,.15);color:var(--green)}
.btn-conn{background:rgba(100,150,220,.08);border-color:rgba(100,150,220,.2);color:rgba(130,170,240,.75)}
.btn-conn:hover{background:rgba(100,150,220,.15);color:rgba(150,190,255,.9)}
.btn-del{background:transparent;border-color:rgba(180,80,80,.25);color:rgba(200,100,100,.55)}
.btn-del:hover{border-color:rgba(200,100,100,.5);color:rgba(220,120,120,.9)}

/* EDIT / FORM STYLES */
.edit-form{padding:2px 0}
.ef{margin-bottom:10px}
.ef-row{display:grid;gap:9px}
.ef-row.c2{grid-template-columns:1fr 1fr}
.ef-row.c3{grid-template-columns:1fr 1fr 1fr}
.el{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin-bottom:3px}
.ei{width:100%;padding:7px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
.ei:focus{border-color:rgba(200,168,75,.45)}
.photo-upload{display:flex;align-items:center;gap:10px}
.photo-preview{width:38px;height:38px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--muted)}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-btn{flex:1;padding:7px 12px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.14);border-radius:8px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.8rem;cursor:pointer;text-align:center;transition:all .2s}
.photo-btn:hover{border-color:rgba(200,168,75,.3);color:var(--gold)}
#photo-file-input{display:none}
.savebtn{width:100%;padding:9px;border-radius:9px;background:var(--gold);border:none;color:#04070c;font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:6px}
.savebtn:hover{background:#d4b454}
.cancelbtn{width:100%;padding:8px;border-radius:9px;margin-top:6px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.cancelbtn:hover{color:var(--text)}

/* SCRIM */
#scrim{position:fixed;inset:0;z-index:299;pointer-events:none;background:rgba(4,7,12,0);transition:background .3s}
#scrim.on{background:rgba(4,7,12,.4);pointer-events:all}

/* MEMBERS PANEL */
#members-panel{position:fixed;top:0;left:0;bottom:0;width:310px;z-index:350;background:rgba(5,10,20,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#members-panel.open{transform:translateX(0)}
.mp-head{padding:20px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mp-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--text)}
.mp-close{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mp-close:hover{color:var(--text)}
.mp-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.mp-search input{width:100%;padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.84rem;outline:none}
.mp-list{flex:1;overflow-y:auto;padding:6px 0}
.mp-gen{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:10px 14px 4px}
.mp-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .15s}
.mp-item:hover{background:rgba(255,255,255,.04)}
.mp-photo{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600}
.mp-photo img{width:100%;height:100%;object-fit:cover}
.mp-info{flex:1;min-width:0}
.mp-name{font-size:.86rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-sub{font-size:.71rem;color:var(--muted);font-style:italic}
.mp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ADD CONNECTION MODAL */
#conn-bg{position:fixed;inset:0;z-index:450;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center}
#conn-bg.open{opacity:1;pointer-events:all}
#conn-modal{background:#080f1d;border:1px solid rgba(255,255,255,.1);border-radius:16px;width:380px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;padding:26px;box-shadow:0 30px 60px rgba(0,0,0,.6);transform:translateY(12px) scale(.97);transition:transform .25s}
#conn-bg.open #conn-modal{transform:translateY(0) scale(1)}
.conn-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--text);margin-bottom:3px}
.conn-sub{font-size:.82rem;color:var(--muted);margin-bottom:16px}
.conn-search{width:100%;padding:8px 11px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.86rem;outline:none;margin-bottom:10px}
.conn-search:focus{border-color:rgba(200,168,75,.4)}
.conn-list{flex:1;overflow-y:auto;max-height:200px;border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.conn-list::-webkit-scrollbar{width:2px}
.conn-item{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04)}
.conn-item:last-child{border-bottom:none}
.conn-item:hover,.conn-item.selected{background:rgba(200,168,75,.08)}
.conn-item.selected{border-left:2px solid var(--gold)}
.conn-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-item-name{font-size:.86rem;color:var(--text)}
.conn-item-sub{font-size:.72rem;color:var(--muted)}
.conn-rel-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.conn-foot{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

/* ZOOM + LEGEND */
#zc{position:fixed;bottom:28px;left:28px;z-index:100;display:flex;flex-direction:column;gap:5px}
.zb{width:33px;height:33px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.zb:hover{background:rgba(200,168,75,.12);color:var(--gold)}
#leg{position:fixed;bottom:28px;right:28px;z-index:100;background:rgba(6,11,20,.82);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:.71rem;color:var(--muted)}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lr:last-child{margin-bottom:0}
.ld{width:7px;height:7px;border-radius:50%}

/* TOOLTIP */
#tip{position:fixed;z-index:500;pointer-events:none;padding:6px 11px;border-radius:9px;background:rgba(8,14,26,.97);border:1px solid var(--border);font-size:.78rem;color:var(--text);opacity:0;transition:opacity .12s;white-space:nowrap;backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px}
#tip.show{opacity:1}
.tip-photo{width:22px;height:22px;border-radius:50%;overflow:hidden}
.tip-photo img{width:100%;height:100%;object-fit:cover}

/* ADD MEMBER MODAL */
#mbg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center}
#mbg.open{opacity:1;pointer-events:all}
#modal{background:#08101e;border:1px solid rgba(255,255,255,.1);border-radius:16px;width:420px;max-width:92vw;max-height:92vh;overflow-y:auto;padding:28px;box-shadow:0 30px 60px rgba(0,0,0,.55);transform:translateY(14px) scale(.97);transition:transform .25s}
#modal::-webkit-scrollbar{width:2px}
#mbg.open #modal{transform:translateY(0) scale(1)}
.mt{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--text);margin-bottom:3px}
.ms{font-size:.82rem;color:var(--muted);margin-bottom:18px}
.mf{margin-bottom:11px}
.mf-row{display:grid;gap:9px}
.mf-row.c2{grid-template-columns:1fr 1fr}
.mf-row.c3{grid-template-columns:2fr 1fr 1fr}
.ml{display:block;font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.mi{width:100%;padding:8px 11px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
.mi:focus{border-color:rgba(200,168,75,.42)}
.mfoot{display:flex;gap:9px;margin-top:16px;justify-content:flex-end}
.mcan{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.mcan:hover{color:var(--text)}
.madd{padding:7px 20px;background:var(--gold);border:none;border-radius:8px;color:#04070c;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.madd:hover{background:#d4b454}
</style>
</head>
<body>

<div id="loading"><div class="load-ring"></div><span class="load-txt">Loading your family tree…</span></div>
<div id="atm"></div>
<div id="scrim" onclick="handleScrimClick(event)"></div>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/>
      <path d="M12 16C12 13 9 11 5 12"/><path d="M12 16C12 13 15 11 19 12"/>
    </svg>
    Twygie
  </div>
  <div id="mcount" onclick="openMembersPanel()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
      <path d="M17 11a3 3 0 1 0 0-6"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    </svg>
    <strong id="mcnum">0</strong>&nbsp;members
  </div>
  <div class="hbtns">
    <button class="hbtn" id="mode-btn" onclick="toggleTreeMode()" title="Toggle Simple/Complex view">Simple view</button>
    <div id="save-ind">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      Saved
    </div>
    <button class="hbtn" onclick="resetView()">Fit to screen</button>
    <button class="hbtn acc" onclick="openModal(null)">+ Add member</button>
    <div class="uavatar" id="uavatar" onclick="signOut()" title="Sign out"><span id="uinitial">?</span></div>
  </div>
</div>

<!-- TREE CANVAS -->
<div id="wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="gf-y" x="-250%" y="-250%" width="600%" height="600%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b2"/>
        <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gf-a" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>

<script>
// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBwtDMGEIphvwvq319MZIr62C32fvSSe-4",
  authDomain: "twygie.firebaseapp.com",
  projectId: "twygie",
  storageBucket: "twygie.firebasestorage.app",
  messagingSenderId: "654053569477",
  appId: "1:654053569477:web:9296f441c285686d7c11ac"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

function makeDefaultTree(user) {
  let firstName = '', lastName = '';
  if (user.displayName) {
    const parts = user.displayName.trim().split(' ');
    firstName = parts[0] || '';
    lastName = parts.slice(1).join(' ') || '';
  }
  return [
    { id:'you', name: user.displayName||'Your Name', firstName, lastName,
      gender:'', dob:{month:'',day:'',year:''}, city:'', state:'', parents:[],
      isYou:true, note:'Welcome to Twygie! Tap Edit to add your story.', x:600, y:400 }
  ];
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
let currentUser=null, saveTimer=null;
auth.onAuthStateChanged(async user => {
  if (!user){ window.location.href='login.html'; return; }
  currentUser=user;
  const initEl=document.getElementById('uinitial');
  const avatarEl=document.getElementById('uavatar');
  if(user.photoURL){ initEl.style.display='none'; const img=document.createElement('img'); img.src=user.photoURL; avatarEl.appendChild(img); }
  else initEl.textContent=(user.displayName||user.email||'?')[0].toUpperCase();
  await loadTree();
  hideLoading();
});
async function signOut(){ if(!confirm('Sign out?')) return; await auth.signOut(); window.location.href='login.html'; }

// ─── FIRESTORE ────────────────────────────────────────────────────────────────
function userDoc(){ return db.collection('familyTrees').doc(currentUser.uid); }
async function loadTree(){
  try{
    const snap=await userDoc().get();
    if(snap.exists && snap.data().people && snap.data().people.length) P=snap.data().people;
    else { P=makeDefaultTree(currentUser); await saveTree(false); }
  }catch(e){ P=makeDefaultTree(currentUser||{displayName:''}); }
  rebuild(); render(); setTimeout(resetView,90);
}
async function saveTree(ind=true){
  if(!currentUser) return;
  try{
    await userDoc().set({ people:P, updatedAt:firebase.firestore.FieldValue.serverTimestamp(), ownerEmail:currentUser.email||'' });
    if(ind) flashSaved();
  }catch(e){ console.warn('Save failed',e); }
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>saveTree(true),1800); }
function flashSaved(){ const e=document.getElementById('save-ind'); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); }
function hideLoading(){ const e=document.getElementById('loading'); e.classList.add('fade'); setTimeout(()=>e.classList.add('gone'),420); }

// ─── DATA ─────────────────────────────────────────────────────────────────────
let P=[], byId={};
function rebuild(){ byId={}; P.forEach(p=>{ if(!p.dob) p.dob={}; byId[p.id]=p; }); autoLayout(); updateCount(); }
function g(id){ return byId[id]; }
let nxt=Date.now();
let treeMode='complex'; // 'simple' | 'complex'
function toggleTreeMode(){
  treeMode=treeMode==='simple'?'complex':'simple';
  document.getElementById('mode-btn').textContent=treeMode==='simple'?'Complex view':'Simple view';
  render();
}
function updateCount(){ document.getElementById('mcnum').textContent=P.length; }
function fullName(p){ return p.name||[(p.firstName||''),(p.lastName||'')].filter(Boolean).join(' ')||'Unknown'; }

// ─── AUTO LAYOUT ──────────────────────────────────────────────────────────────
// CONVENTION: parents ABOVE (smaller y), children BELOW (larger y)
function autoLayout(){
  if(!P.length) return;
  const youNode=P.find(p=>p.isYou)||P[0];
  const gen={};
  const visited=new Set();
  const queue=[{id:youNode.id, gv:0}];
  while(queue.length){
    const {id,gv}=queue.shift();
    if(visited.has(id)) continue;
    visited.add(id); gen[id]=gv;
    const p=byId[id]; if(!p) continue;
    // Parents are ABOVE = negative gen (smaller y)
    (p.parents||[]).forEach(pid=>{ if(!visited.has(pid)) queue.push({id:pid,gv:gv-1}); });
    // Children are BELOW = positive gen (larger y)
    P.filter(x=>(x.parents||[]).includes(id)).forEach(c=>{ if(!visited.has(c.id)) queue.push({id:c.id,gv:gv+1}); });
    // Spouse: same generation
    if(p.spouseOf){ const sp=byId[p.spouseOf]; if(sp&&!visited.has(p.spouseOf)) queue.push({id:p.spouseOf,gv}); }
    const spNode=P.find(x=>x.spouseOf===id);
    if(spNode&&!visited.has(spNode.id)) queue.push({id:spNode.id,gv});
  }
  P.forEach(p=>{ if(gen[p.id]===undefined) gen[p.id]=0; });

  const byGen={};
  P.forEach(p=>{ const gv=gen[p.id]; if(!byGen[gv]) byGen[gv]=[]; byGen[gv].push(p); });

  const centerX=600, baseY=400, genH=170, spacing=165;

  Object.entries(byGen).forEach(([gStr,people])=>{
    const gNum=parseInt(gStr);
    // gNum negative (parents) → y = baseY - |gNum|*genH (ABOVE you)
    // gNum positive (children) → y = baseY + gNum*genH (BELOW you)
    const y = baseY + gNum * genH;

    // Put you first, then spouses next to you
    people.sort((a,b)=>{
      if(a.isYou) return -1; if(b.isYou) return 1;
      const you=P.find(x=>x.isYou);
      if(you){
        const aIsSpouse=a.spouseOf===you.id||you.spouseOf===a.id;
        const bIsSpouse=b.spouseOf===you.id||you.spouseOf===b.id;
        if(aIsSpouse&&!bIsSpouse) return 1;
        if(bIsSpouse&&!aIsSpouse) return -1;
      }
      return fullName(a).localeCompare(fullName(b));
    });

    const n=people.length, totalW=(n-1)*spacing, startX=centerX-totalW/2;
    people.forEach((p,i)=>{ p.x=startX+i*spacing; p.y=y; });
  });
}

// ─── VISUAL HELPERS ───────────────────────────────────────────────────────────
function col(p){
  if(p.isYou) return '#f0efeb';
  if(p.death||(p.dod&&p.dod.year)) return '#6b9ec2';
  const birthYear=parseInt(p.dob&&p.dob.year)||p.birth||0;
  if(birthYear>=2000) return '#4ecdb4';
  return '#f0b845';
}
function gclass(p){ if(p.isYou) return 'you'; if(p.death||(p.dod&&p.dod.year)) return 'blue'; const by=parseInt(p.dob&&p.dob.year)||p.birth||0; if(by>=2000) return 'teal'; return 'amber'; }
function gfilt(p){ if(p.isYou) return 'gf-y'; if(p.death) return 'gf-b'; if((p.dob&&p.dob.year>=2000)||(p.birth>=2000)) return 'gf-t'; return 'gf-a'; }
function nr(p){ return p.isYou?13:9; }
function gr(p){ return p.isYou?40:26; }
function initials(p){ const n=fullName(p); return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function orb(a,b){
  const h=a.charCodeAt(0)*127+b.charCodeAt(0)*31+a.length*17;
  const v=Math.sin(h*.4531)*43758.5;
  return (v-Math.floor(v)-.5)*28;
}

function dobDisplay(p){
  if(p.dob && (p.dob.month||p.dob.day||p.dob.year)){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const {month,day,year}=p.dob;
    const parts=[];
    if(month) parts.push(months[parseInt(month)-1]);
    if(day) parts.push(day);
    if(year) parts.push(year);
    return `b. ${parts.join(' ')}`;
  }
  return p.birth?`b. ${p.birth}`:'';
}

function placeDisplay(p){
  if(p.city||p.state) return [p.city,p.state].filter(Boolean).join(', ');
  return p.place||'';
}

// ─── GENDER-AWARE RELATIONSHIP LABELS ────────────────────────────────────────
function genderedRel(baseRel, gender){
  const m=gender==='male', f=gender==='female';
  const map={
    'Parent': m?'Father':f?'Mother':'Parent',
    'Child':  m?'Son':f?'Daughter':'Child',
    'Sibling':m?'Brother':f?'Sister':'Sibling',
    'Spouse': m?'Husband':f?'Wife':'Partner',
    'Grandparent':m?'Grandfather':f?'Grandmother':'Grandparent',
    'Grandchild': m?'Grandson':f?'Granddaughter':'Grandchild',
  };
  return map[baseRel]||baseRel;
}

function getRelToYou(id){
  const you=P.find(p=>p.isYou); if(!you||id===you.id) return '';
  const p=byId[id]; if(!p) return '';
  // Use stored relLabel first
  if(p.relLabel) return genderedRel(p.relLabel,p.gender)||p.relLabel;
  // Infer
  if((p.parents||[]).includes(you.id)) return genderedRel('Child',p.gender);
  if((you.parents||[]).includes(id)) return genderedRel('Parent',p.gender);
  if(p.spouseOf===you.id||you.spouseOf===id) return genderedRel('Spouse',p.gender);
  const myP=new Set(you.parents||[]);
  if(myP.size&&(p.parents||[]).some(pp=>myP.has(pp))) return genderedRel('Sibling',p.gender);
  const grandIds=new Set();
  (you.parents||[]).forEach(pid=>{ const par=byId[pid]; if(par)(par.parents||[]).forEach(gid=>grandIds.add(gid)); });
  if(grandIds.has(id)) return genderedRel('Grandparent',p.gender);
  const myChildren=P.filter(x=>(x.parents||[]).includes(you.id));
  for(const c of myChildren){ if((p.parents||[]).includes(c.id)) return genderedRel('Grandchild',p.gender); }
  return 'Family';
}

const NS='http://www.w3.org/2000/svg';
function se(t){ return document.createElementNS(NS,t); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('bG').innerHTML='';
  document.getElementById('nG').innerHTML='';
  document.getElementById('defs-clips').innerHTML='';
  drawBranches();
  drawNodes();
}

function bstyle(dy){
  const a=Math.abs(dy);
  if(a>280) return {w:9,o:.62};
  if(a>180) return {w:6.5,o:.52};
  if(a>100) return {w:4.5,o:.44};
  return {w:3,o:.36};
}

// ─── BRANCH COLOR THEME ──────────────────────────────────────────────────────
// parent-child: warm green, spouse: soft blue, sibling: orange, labeled: purple
const BR_COLORS = {
  parentChild: [100, 180, 100],
  spouse:      [100, 140, 220],
  sibling:     [220, 140, 60],
  labeled:     [160, 100, 220],
};
function brRgba([r,g,b], o){ return `rgba(${r},${g},${b},${o})`; }

function drawBranches(){
  const bG=document.getElementById('bG');
  const simple=treeMode==='simple';

  // ── Parent-child lines (green) ──
  P.forEach(child=>{
    (child.parents||[]).forEach(pid=>{
      const par=byId[pid]; if(!par) return;
      const dy=par.y-child.y;
      const {w,o}=bstyle(dy);
      const ox=orb(pid,child.id);
      const r=Math.abs(dy)*.3;
      const d=`M ${par.x} ${par.y} C ${par.x+ox*.3} ${par.y+r} ${child.x+ox*.2} ${child.y-r} ${child.x} ${child.y}`;
      const path=se('path');
      path.setAttribute('d',d);
      path.setAttribute('stroke', brRgba(BR_COLORS.parentChild, o));
      path.setAttribute('stroke-width',String(w));
      path.setAttribute('fill','none');
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('class','br');
      path.dataset.src=pid; path.dataset.dst=child.id;
      bG.appendChild(path);
    });
  });

  // ── Spouse lines (blue dashed) ──
  const drawn=new Set();
  P.forEach(p=>{
    if(!p.spouseOf) return;
    const key=[p.id,p.spouseOf].sort().join('|');
    if(drawn.has(key)) return;
    drawn.add(key);
    const sp=byId[p.spouseOf]; if(!sp) return;
    const path=se('path');
    path.setAttribute('d',`M ${p.x} ${p.y} L ${sp.x} ${sp.y}`);
    path.setAttribute('stroke', brRgba(BR_COLORS.spouse, .45));
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-dasharray','6,4');
    path.setAttribute('fill','none');
    path.setAttribute('class','br');
    path.dataset.src=p.id; path.dataset.dst=sp.id;
    bG.appendChild(path);
  });

  if(simple) return; // simple mode stops here

  // ── Sibling lines (orange dotted) — only in complex mode ──
  const sibDrawn=new Set();
  P.forEach(p=>{
    const pars=p.parents||[];
    if(!pars.length) return;
    P.filter(x=>x.id!==p.id&&(x.parents||[]).some(pp=>pars.includes(pp))).forEach(sib=>{
      const key=[p.id,sib.id].sort().join('|');
      if(sibDrawn.has(key)) return;
      sibDrawn.add(key);
      const mx=(p.x+sib.x)/2, my=(p.y+sib.y)/2-20;
      const path=se('path');
      path.setAttribute('d',`M ${p.x} ${p.y} Q ${mx} ${my} ${sib.x} ${sib.y}`);
      path.setAttribute('stroke', brRgba(BR_COLORS.sibling, .3));
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-dasharray','3,5');
      path.setAttribute('fill','none');
      path.setAttribute('class','br');
      path.dataset.src=p.id; path.dataset.dst=sib.id;
      bG.appendChild(path);
    });
  });

  // ── Labeled connections (purple dotted) ──
  const connDrawn=new Set();
  P.forEach(p=>{
    (p.connections||[]).forEach(c=>{
      const key=[p.id,c.targetId].sort().join('|');
      if(connDrawn.has(key)) return;
      connDrawn.add(key);
      const other=byId[c.targetId]; if(!other) return;
      const mx=(p.x+other.x)/2, my=(p.y+other.y)/2-30;
      const path=se('path');
      path.setAttribute('d',`M ${p.x} ${p.y} Q ${mx} ${my} ${other.x} ${other.y}`);
      path.setAttribute('stroke', brRgba(BR_COLORS.labeled, .28));
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-dasharray','2,6');
      path.setAttribute('fill','none');
      path.setAttribute('class','br');
      path.dataset.src=p.id; path.dataset.dst=c.targetId;
      bG.appendChild(path);
    });
  });
}

function drawNodes(){
  const nG=document.getElementById('nG');
  const defs=document.getElementById('defs-clips');
  P.forEach(p=>{
    const R=nr(p), GR=gr(p), c=col(p);
    const delay=((p.x*.04+p.y*.02)%3.5).toFixed(2);

    if(p.photo){
      const cp=se('clipPath'); cp.setAttribute('id',`cp-${p.id}`);
      const ci=se('circle'); ci.setAttribute('r',String(R)); cp.appendChild(ci);
      defs.appendChild(cp);
    }

    const G=se('g');
    G.setAttribute('class','nd');
    G.setAttribute('transform',`translate(${p.x},${p.y})`);
    G.dataset.id=p.id;

    // Extra wide glow for isYou
    if(p.isYou){
      const outerGlow=se('circle');
      outerGlow.setAttribute('r',String(GR+16));
      outerGlow.setAttribute('fill',c);
      outerGlow.setAttribute('fill-opacity','.06');
      outerGlow.setAttribute('filter',`url(#${gfilt(p)})`);
      G.appendChild(outerGlow);
    }

    // Pulsing halo
    const halo=se('circle');
    halo.setAttribute('r',String(GR));
    halo.setAttribute('fill',c);
    halo.setAttribute('fill-opacity','.22');
    halo.setAttribute('filter',`url(#${gfilt(p)})`);
    halo.setAttribute('class',`gp hi ${gclass(p)}`);
    halo.style.animationDelay=`-${delay}s`;

    // Soft inner ring
    const ring=se('circle');
    ring.setAttribute('r',String(R+4));
    ring.setAttribute('fill',c);
    ring.setAttribute('fill-opacity','.28');

    // Core
    const core=se('circle');
    core.setAttribute('r',String(R));
    core.setAttribute('fill',p.photo?'rgba(0,0,0,.35)':c);
    core.setAttribute('class','core');

    G.append(halo,ring,core);

    // Photo
    if(p.photo){
      const img=se('image');
      img.setAttribute('href',p.photo);
      img.setAttribute('x',String(-R)); img.setAttribute('y',String(-R));
      img.setAttribute('width',String(R*2)); img.setAttribute('height',String(R*2));
      img.setAttribute('clip-path',`url(#cp-${p.id})`);
      img.setAttribute('preserveAspectRatio','xMidYMid slice');
      img.setAttribute('class','core');
      G.appendChild(img);
    }

    // Label
    const lbl=se('text');
    lbl.textContent=p.isYou?'You':(p.firstName||fullName(p).split(' ')[0]);
    lbl.setAttribute('class',`nlbl${p.isYou?' you':''}`);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('y',String(R+15));
    G.appendChild(lbl);

    // Events
    G.addEventListener('mousedown',e=>onNodeMouseDown(e,p.id));
    G.addEventListener('touchstart',e=>onNodeTouchStart(e,p.id),{passive:true});
    G.addEventListener('mouseenter',e=>showTip(e,p));
    G.addEventListener('mouseleave',hideTip);
    nG.appendChild(G);
  });
}

// ─── NODE DRAG ────────────────────────────────────────────────────────────────
let nodeDrag=null;

function onNodeMouseDown(e,id){
  e.stopPropagation();
  const p=byId[id]; if(!p) return;
  nodeDrag={id,startX:e.clientX,startY:e.clientY,origX:p.x,origY:p.y,moved:false};
}

function onNodeTouchStart(e,id){
  if(e.touches.length!==1) return;
  const p=byId[id]; if(!p) return;
  nodeDrag={id,startX:e.touches[0].clientX,startY:e.touches[0].clientY,origX:p.x,origY:p.y,moved:false,touch:true};
}

document.addEventListener('mousemove',e=>{
  if(nodeDrag){
    const dx=e.clientX-nodeDrag.startX, dy=e.clientY-nodeDrag.startY;
    if(!nodeDrag.moved&&Math.hypot(dx,dy)>6) nodeDrag.moved=true;
    if(nodeDrag.moved){
      hideTip();
      const p=byId[nodeDrag.id]; if(!p) return;
      p.x=nodeDrag.origX+dx/scale; p.y=nodeDrag.origY+dy/scale;
      render();
      // Update branch dims if card open
      if(selId) highlightConnected(selId);
    }
    return;
  }
  if(drag){ tx=e.clientX-dsx; ty=e.clientY-dsy; applyT(); }
});

document.addEventListener('mouseup',e=>{
  if(nodeDrag){
    if(!nodeDrag.moved) selectNode(nodeDrag.id);
    else scheduleSave();
    nodeDrag=null; return;
  }
  drag=false; document.getElementById('wrap').style.cursor='';
});

document.addEventListener('touchmove',e=>{
  if(nodeDrag&&nodeDrag.touch&&e.touches.length===1){
    const dx=e.touches[0].clientX-nodeDrag.startX, dy=e.touches[0].clientY-nodeDrag.startY;
    if(!nodeDrag.moved&&Math.hypot(dx,dy)>8) nodeDrag.moved=true;
    if(nodeDrag.moved){
      const p=byId[nodeDrag.id]; if(!p) return;
      p.x=nodeDrag.origX+dx/scale; p.y=nodeDrag.origY+dy/scale;
      render();
    }
  }
},{passive:true});

document.addEventListener('touchend',()=>{
  if(nodeDrag){
    if(!nodeDrag.moved) selectNode(nodeDrag.id);
    else scheduleSave();
    nodeDrag=null;
  }
  tpan=false;
});

// ─── SELECTION ────────────────────────────────────────────────────────────────
let selId=null;

function highlightConnected(id){
  const p=byId[id]; if(!p) return;
  const conn=new Set([id]);
  (p.parents||[]).forEach(pid=>conn.add(pid));
  P.filter(x=>(x.parents||[]).includes(id)).forEach(x=>conn.add(x.id));
  const myP=new Set(p.parents||[]);
  P.filter(x=>x.id!==id&&(x.parents||[]).some(pp=>myP.has(pp))).forEach(x=>conn.add(x.id));
  if(p.spouseOf) conn.add(p.spouseOf);
  const sp=P.find(x=>x.spouseOf===id); if(sp) conn.add(sp.id);

  document.querySelectorAll('.nd').forEach(n=>{
    n.classList.toggle('dim',!conn.has(n.dataset.id));
    n.classList.toggle('sel',n.dataset.id===id);
  });
  document.querySelectorAll('.br').forEach(b=>{
    const lit=conn.has(b.dataset.src)&&conn.has(b.dataset.dst);
    b.classList.toggle('dim',!lit); b.classList.toggle('lit',lit);
  });
}

function selectNode(id){
  selId=id; hideTip();
  highlightConnected(id);
  zoomTo(byId[id]);
  fillCard(byId[id]);
  document.getElementById('card').classList.add('open');
  document.getElementById('scrim').classList.add('on');
}

function zoomTo(p){
  if(!p) return;
  const s=2.1;
  tx=window.innerWidth/2-p.x*s;
  ty=window.innerHeight/2-p.y*s;
  scale=s; applyT(true);
}

function fillCard(p){
  if(!p) return;
  const c=col(p);
  document.getElementById('cbar').style.cssText=`background:${c};box-shadow:0 0 10px ${c}`;
  const av=document.getElementById('cavatar');
  av.style.borderColor=c;
  av.innerHTML=p.photo?`<img src="${p.photo}"/>`:`<span style="color:${c}">${initials(p)}</span>`;
  document.getElementById('cname').textContent=p.isYou?'You':fullName(p);
  document.getElementById('cdob').textContent=dobDisplay(p);
  document.getElementById('cplace').textContent=placeDisplay(p);

  const rel=getRelToYou(p.id);
  const relBadge=document.getElementById('crel-badge');
  relBadge.innerHTML=(!p.isYou&&rel)?`<span class="crel-badge">${rel}</span>`:'';

  // Connections
  const parentsArr=(p.parents||[]).map(pid=>{
    const par=byId[pid]; if(!par) return null;
    const youNode=P.find(x=>x.isYou);
    let lbl='Parent';
    if(par.isYou) lbl=genderedRel('Parent',par.gender)||'Parent';
    else lbl=par.relLabel?genderedRel(par.relLabel,par.gender):genderedRel('Parent',par.gender);
    return {p:par,rel:lbl};
  }).filter(Boolean);

  const children=P.filter(x=>(x.parents||[]).includes(p.id)).map(x=>({
    p:x, rel: x.relLabel?genderedRel(x.relLabel,x.gender):genderedRel('Child',x.gender)
  }));

  const myP2=new Set(p.parents||[]);
  const sibs=P.filter(x=>x.id!==p.id&&(x.parents||[]).some(pp=>myP2.has(pp))).map(x=>({
    p:x, rel:genderedRel('Sibling',x.gender)
  }));

  const spouseNode=p.spouseOf?byId[p.spouseOf]:P.find(x=>x.spouseOf===p.id);
  const spouses=spouseNode?[{p:spouseNode,rel:genderedRel('Spouse',spouseNode.gender)}]:[];
  const conns=[...spouses,...parentsArr,...children,...sibs];

  let html='';
  if(p.note) html+=`<div class="csec">Story</div><p class="cbio">${p.note}</p>`;
  if(conns.length){
    html+=`<div class="csec">Immediate family</div><div class="frow">`;
    conns.forEach(({p:cp,rel})=>{
      const cc=col(cp);
      const chipPhoto=cp.photo
        ?`<div class="fchip-photo"><img src="${cp.photo}"/></div>`
        :`<div class="fdot" style="background:${cc};box-shadow:0 0 5px ${cc}"></div>`;
      html+=`<div class="fchip" onclick="selectNode('${cp.id}')">
        ${chipPhoto}
        <div class="fi2"><div class="fn2">${fullName(cp)}</div><div class="frel">${rel}</div></div>
        <div class="fyr">${dobDisplay(cp).replace('b. ','')}</div></div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="card-actions">
    <button class="btn-sm btn-edit" onclick="editCard('${p.id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <button class="btn-sm btn-twyg" onclick="closeCard();openModal('${p.id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      Add a Twyg
    </button>
    <button class="btn-sm btn-conn" onclick="openConnModal('${p.id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Add Connection
    </button>
    ${!p.isYou?`<button class="btn-sm btn-del" onclick="removePerson('${p.id}')">Remove</button>`:''}
  </div>`;

  document.getElementById('cbody').innerHTML=html;
}

// ─── EDIT CARD ────────────────────────────────────────────────────────────────
function editCard(id){
  const p=byId[id]; if(!p) return;

  const gOpts=['','male','female','nonbinary'].map(v=>`<option value="${v}" ${p.gender===v?'selected':''}>${{'':"Prefer not to say",male:'Male',female:'Female',nonbinary:'Non-binary'}[v]}</option>`).join('');

  document.getElementById('cbody').innerHTML=`<div class="edit-form">
    <div class="ef ef-row c2">
      <div><label class="el">First Name</label><input class="ei" id="ei-first" value="${(p.firstName||'').replace(/"/g,'&quot;')}" placeholder="First"/></div>
      <div><label class="el">Last Name</label><input class="ei" id="ei-last" value="${(p.lastName||'').replace(/"/g,'&quot;')}" placeholder="Last"/></div>
    </div>
    <div class="ef"><label class="el">Gender</label>
      <select class="ei" style="appearance:none"  id="ei-gender">${gOpts}</select>
    </div>
    <div class="ef"><label class="el">Date of Birth</label>
      <div class="ef-row c3">
        <select class="ei" id="ei-dob-month" style="appearance:none">${mOpts}</select>
        <input class="ei" id="ei-dob-day" type="number" value="${p.dob&&p.dob.day||''}" placeholder="Day" min="1" max="31"/>
        <input class="ei" id="ei-dob-year" type="number" value="${p.dob&&p.dob.year||p.birth||''}" placeholder="Year"/>
      </div>
    </div>
    <div class="ef ef-row c2">
      <div><label class="el">City</label><input class="ei" id="ei-city" value="${(p.city||'').replace(/"/g,'&quot;')}" placeholder="City"/></div>
      <div><label class="el">State</label><input class="ei" id="ei-state" value="${(p.state||'').replace(/"/g,'&quot;')}" placeholder="State"/></div>
    </div>
    <div class="ef"><label class="el">Photo</label>
      <div class="photo-upload">
        <div class="photo-preview" id="edit-photo-preview">${photoPreview}</div>

    <button class="cancelbtn" onclick="fillCard(byId['${id}'])">Cancel</button>

}

function handlePhotoUpload(event,id){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const p=byId[id]; if(!p) return;
    p.photo=e.target.result;
    const prev=document.getElementById('edit-photo-preview');
    if(prev) prev.innerHTML=`<img src="${p.photo}"/>`;
    render(); scheduleSave();
  };
  reader.readAsDataURL(file);
}
function removePhoto(id){ const p=byId[id]; if(!p) return; delete p.photo; render(); scheduleSave(); editCard(id); }

function saveCard(id){
  const p=byId[id]; if(!p) return;
  const first=document.getElementById('ei-first').value.trim();
  const last=document.getElementById('ei-last').value.trim();
  p.firstName=first; p.lastName=last;
  p.name=[first,last].filter(Boolean).join(' ')||p.name;
  p.gender=document.getElementById('ei-gender').value;
  p.dob={
    month:document.getElementById('ei-dob-month').value,
    day:document.getElementById('ei-dob-day').value,
    year:document.getElementById('ei-dob-year').value
  };
  p.birth=parseInt(p.dob.year)||p.birth||null;
  p.city=document.getElementById('ei-city').value.trim();
  p.state=document.getElementById('ei-state').value.trim();
  p.note=document.getElementById('ei-note').value.trim();
  rebuild(); render(); scheduleSave(); selectNode(id);
}

function closeCard(){
  document.getElementById('card').classList.remove('open');
  if(!document.getElementById('members-panel').classList.contains('open'))
    document.getElementById('scrim').classList.remove('on');
  selId=null;
  document.querySelectorAll('.nd').forEach(n=>n.classList.remove('dim','sel'));
  document.querySelectorAll('.br').forEach(b=>b.classList.remove('dim','lit'));
  resetView();
}

function removePerson(id){
  if(!confirm('Remove this person from the tree?')) return;
  const rm=new Set();
  function collect(pid){ rm.add(pid); P.filter(x=>(x.parents||[]).includes(pid)).forEach(x=>collect(x.id)); }
  collect(id);
  P=P.filter(p=>!rm.has(p.id));
  P.forEach(p=>{ if(p.spouseOf&&rm.has(p.spouseOf)) delete p.spouseOf; });
  rebuild(); closeCard(); render(); scheduleSave();
}

// ─── ADD CONNECTION MODAL ────────────────────────────────────────────────────
let connForId=null, connSelectedId=null;

function buildConnRelOptions(name){
  const n=name||'them';
  return [
    ['They are a parent','parent',[['Father',`Father of ${n}`],['Mother',`Mother of ${n}`],['Grandfather',`Grandfather of ${n}`],['Grandmother',`Grandmother of ${n}`],['Stepfather',`Stepfather of ${n}`],['Stepmother',`Stepmother of ${n}`],['Parent',`Parent of ${n}`]]],
    ['They are a child','child',[['Son',`Son of ${n}`],['Daughter',`Daughter of ${n}`],['Grandson',`Grandson of ${n}`],['Granddaughter',`Granddaughter of ${n}`],['Stepson',`Stepson of ${n}`],['Stepdaughter',`Stepdaughter of ${n}`],['Child',`Child of ${n}`]]],
    ['They are a sibling','sibling',[['Brother',`Brother of ${n}`],['Sister',`Sister of ${n}`],['Half-brother',`Half-brother of ${n}`],['Half-sister',`Half-sister of ${n}`]]],
    ['They are a spouse','spouse',[['Husband',`Husband of ${n}`],['Wife',`Wife of ${n}`],['Partner',`Partner of ${n}`]]],
    ['They are extended family','labeled',[['Uncle',`Uncle of ${n}`],['Aunt',`Aunt of ${n}`],['Nephew',`Nephew of ${n}`],['Niece',`Niece of ${n}`],['Cousin',`Cousin of ${n}`],['Father-in-law',`Father-in-law of ${n}`],['Mother-in-law',`Mother-in-law of ${n}`],['Brother-in-law',`Brother-in-law of ${n}`],['Sister-in-law',`Sister-in-law of ${n}`],['Godfather',`Godfather of ${n}`],['Godmother',`Godmother of ${n}`],['Godchild',`Godchild of ${n}`],['Other',`Other connection to ${n}`]]],
  ].map(([group,type,opts])=>
    `<optgroup label="${group}">${opts.map(([lbl,text])=>`<option value="${type}-${lbl}">${text}</option>`).join('')}</optgroup>`
  ).join('');
}

function openConnModal(id){
  connForId=id; connSelectedId=null;
  const p=byId[id];
  const firstName=p.firstName||fullName(p).split(' ')[0];
  document.getElementById('conn-sub').textContent=`Link another member's relationship to ${fullName(p)}`;
  document.getElementById('conn-rel').innerHTML=buildConnRelOptions(firstName);
  document.getElementById('conn-search').value='';
  renderConnList('');
  document.getElementById('conn-bg').classList.add('open');
}
function closeConnModal(){ document.getElementById('conn-bg').classList.remove('open'); connForId=null; connSelectedId=null; }

function filterConnList(){ renderConnList(document.getElementById('conn-search').value||''); }

function renderConnList(query){
  const q=query.toLowerCase();
  const list=P.filter(p=>p.id!==connForId&&(!q||fullName(p).toLowerCase().includes(q)));
  document.getElementById('conn-list').innerHTML=list.map(p=>`
    <div class="conn-item${connSelectedId===p.id?' selected':''}" onclick="selectConnNode('${p.id}')">
      <div class="conn-item-dot" style="background:${col(p)}"></div>
      <div>
        <div class="conn-item-name">${fullName(p)}</div>
        <div class="conn-item-sub">${getRelToYou(p.id)||dobDisplay(p)}</div>
      </div>
    </div>`).join('');
}

function selectConnNode(id){
  connSelectedId=id;
  document.querySelectorAll('.conn-item').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.conn-item').forEach(el=>{
    if(el.querySelector('.conn-item-name').textContent===fullName(byId[id])) el.classList.add('selected');
  });
}

function saveConnection(){
  if(!connForId||!connSelectedId){ alert('Please select a member.'); return; }
  const target=byId[connForId];   // the node the card is about
  const other=byId[connSelectedId]; // the node we're connecting to it
  const rel=document.getElementById('conn-rel').value;

  const dashIdx=rel.indexOf('-');
  const type=rel.slice(0,dashIdx);
  const label=rel.slice(dashIdx+1);

  const mGender={'father':'male','grandfather':'male','stepfather':'male','son':'male','grandson':'male','stepson':'male','brother':'male','half-brother':'male','husband':'male','uncle':'male','nephew':'male','brother-in-law':'male','godfather':'male'};
  const fGender={'mother':'female','grandmother':'female','stepmother':'female','daughter':'female','granddaughter':'female','stepdaughter':'female','sister':'female','half-sister':'female','wife':'female','aunt':'female','niece':'female','sister-in-law':'female','godmother':'female'};
  const lkey=label.toLowerCase();
  if(!other.gender){ if(mGender[lkey]) other.gender='male'; else if(fGender[lkey]) other.gender='female'; }

  if(type==='parent'){
    if(!(target.parents||[]).includes(other.id)) target.parents=[...(target.parents||[]),other.id];
    if(!other.relLabel) other.relLabel='Parent';
    other.relLabel=label;
  } else if(type==='child'){
    if(!(other.parents||[]).includes(target.id)) other.parents=[...(other.parents||[]),target.id];
    if(!other.relLabel) other.relLabel='Child';
    other.relLabel=label;
  } else if(type==='sibling'){
    (target.parents||[]).forEach(pid=>{ if(!(other.parents||[]).includes(pid)) other.parents=[...(other.parents||[]),pid]; });
    if(!other.relLabel) other.relLabel='Sibling';
  } else if(type==='spouse'){
    other.spouseOf=target.id;
    if(!other.gender&&label.toLowerCase()==='husband') other.gender='male';
    if(!other.gender&&label==='wife') other.gender='female';
    if(!other.relLabel) other.relLabel='Spouse';
  }

  rebuild(); render(); scheduleSave();
  closeConnModal();
  selectNode(connForId);
}

// ─── MEMBERS PANEL ────────────────────────────────────────────────────────────
function openMembersPanel(){
  renderMembersList();
  document.getElementById('members-panel').classList.add('open');
  document.getElementById('scrim').classList.add('on');
}
function closeMembersPanel(){
  document.getElementById('members-panel').classList.remove('open');
  if(!selId) document.getElementById('scrim').classList.remove('on');
}

function renderMembersList(){
  const query=(document.getElementById('mp-search-input').value||'').toLowerCase();
  const youNode=P.find(p=>p.isYou);
  const gen={};
  if(youNode){
    const q=[{id:youNode.id,gv:0}]; const vis=new Set();
    while(q.length){ const {id,gv}=q.shift(); if(vis.has(id)) continue; vis.add(id); gen[id]=gv;
      const p=byId[id]; if(!p) continue;
      (p.parents||[]).forEach(pid=>{ if(!vis.has(pid)) q.push({id:pid,gv:gv-1}); });
      P.filter(x=>(x.parents||[]).includes(id)).forEach(c=>{ if(!vis.has(c.id)) q.push({id:c.id,gv:gv+1}); });
    }
  }
  P.forEach(p=>{ if(gen[p.id]===undefined) gen[p.id]=0; });

  const genLabels={'-4':'Great-Great-Grandparents','-3':'Great-Grandparents','-2':'Grandparents','-1':'Parents','0':'Your Generation','1':'Children','2':'Grandchildren','3':'Great-Grandchildren'};
  const filtered=P.filter(p=>!query||fullName(p).toLowerCase().includes(query));
  const byGen2={};
  filtered.forEach(p=>{ const gv=gen[p.id]||0; if(!byGen2[gv]) byGen2[gv]=[]; byGen2[gv].push(p); });
  const gens=Object.keys(byGen2).map(Number).sort((a,b)=>a-b);

  let html='';
  gens.forEach(gv=>{
    const label=genLabels[gv]||(gv<0?`${Math.abs(gv)} generations up`:`${gv} generations down`);
    html+=`<div class="mp-gen">${label}</div>`;
    byGen2[gv].sort((a,b)=>fullName(a).localeCompare(fullName(b))).forEach(p=>{
      const c=col(p), rel=getRelToYou(p.id);
      html+=`<div class="mp-item" onclick="closeMembersPanel();selectNode('${p.id}')">
        <div class="mp-photo" style="color:${c}">${p.photo?`<img src="${p.photo}"/>`:`<span>${initials(p)}</span>`}</div>
        <div class="mp-info">
          <div class="mp-name">${fullName(p)}${p.isYou?' (You)':''}</div>
          <div class="mp-sub">${rel||''}${dobDisplay(p)?` · ${dobDisplay(p)}`:''}</div>
        </div>
        <div class="mp-dot" style="background:${c};box-shadow:0 0 5px ${c}"></div>
      </div>`;
    });
  });
  if(!filtered.length) html=`<div style="text-align:center;padding:30px;color:var(--muted);font-size:.84rem">No members found</div>`;
  document.getElementById('mp-list').innerHTML=html;
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
function showTip(e,p){
  if(selId||nodeDrag) return;
  const t=document.getElementById('tip');
  const photoHtml=p.photo?`<div class="tip-photo"><img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>`:'';
  const rel=getRelToYou(p.id);

  t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY-12)+'px';
  t.classList.add('show');
}
function hideTip(){ document.getElementById('tip').classList.remove('show'); }

// ─── TRANSFORM ────────────────────────────────────────────────────────────────
let tx=0, ty=0, scale=1;
function applyT(anim=false){
  const tg=document.getElementById('tg');
  if(anim){ tg.classList.add('anim'); setTimeout(()=>tg.classList.remove('anim'),700); }
  tg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
}
function resetView(){
  if(!P.length) return;
  const xs=P.map(p=>p.x), ys=P.map(p=>p.y);
  const x0=Math.min(...xs)-90, x1=Math.max(...xs)+90;
  const y0=Math.min(...ys)-70, y1=Math.max(...ys)+100;
  const W=window.innerWidth, H=window.innerHeight;
  scale=Math.min(1,W/(x1-x0),(H-80)/(y1-y0))*.88;
  tx=(W-(x1-x0)*scale)/2-x0*scale;
  ty=(H-(y1-y0)*scale)/2-y0*scale+18;
  applyT(true);
}
function zoomBy(f){
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  tx=cx-(cx-tx)*f; ty=cy-(cy-ty)*f;
  scale=Math.max(.12,Math.min(6,scale*f)); applyT();
}

// ─── PAN ─────────────────────────────────────────────────────────────────────
let drag=false, dsx=0, dsy=0;
const wrap=document.getElementById('wrap');

wrap.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd')) return;
  drag=true; dsx=e.clientX-tx; dsy=e.clientY-ty;
  wrap.style.cursor='grabbing'; hideTip();
});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.11:.9;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  tx=mx-(mx-tx)*f; ty=my-(my-ty)*f;
  scale=Math.max(.12,Math.min(6,scale*f)); applyT();
},{passive:false});

let ltD=0, tpan=false, tdsx=0, tdsy=0;
wrap.addEventListener('touchstart',e=>{
  if(e.target.closest('.nd')) return;
  if(e.touches.length===1){ tpan=true; tdsx=e.touches[0].clientX-tx; tdsy=e.touches[0].clientY-ty; }
  else if(e.touches.length===2){ tpan=false; ltD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(nodeDrag) return;
  if(e.touches.length===1&&tpan){ tx=e.touches[0].clientX-tdsx; ty=e.touches[0].clientY-tdsy; applyT(); }
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/ltD; ltD=d;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy2=(e.touches[0].clientY+e.touches[1].clientY)/2;
    tx=cx-(cx-tx)*f; ty=cy2-(cy2-ty)*f;
    scale=Math.max(.12,Math.min(6,scale*f)); applyT();
  }
},{passive:true});

// ─── ADD MEMBER ───────────────────────────────────────────────────────────────
let addFor=null;
const CHILD_RELS=['Son','Daughter','Grandson','Granddaughter','Stepson','Stepdaughter','Nephew','Niece'];
const PARENT_RELS=['Father','Mother','Grandfather','Grandmother','Stepfather','Stepmother','Father-in-law','Mother-in-law','Uncle','Aunt'];
const SPOUSE_RELS=['Husband','Wife','Partner'];
const SIBLING_RELS=['Brother','Sister','Brother-in-law','Sister-in-law','Cousin'];

function toggleDeathDate(){
  const cb=document.getElementById('f-deceased');
  const fields=document.getElementById('f-death-fields');
  const track=document.getElementById('f-deceased-track');
  const thumb=document.getElementById('f-deceased-thumb');
  if(!fields||!cb) return;
  fields.style.display=cb.checked?'block':'none';
  if(track) track.style.background=cb.checked?'rgba(200,168,75,.5)':'rgba(255,255,255,.12)';
  if(thumb) thumb.style.transform=cb.checked?'translateX(15px)':'translateX(0)';
}

function openModal(forId){
  addFor=forId;
  const fp=forId?byId[forId]:null;
  document.getElementById('msub').textContent=fp?`Connected to ${fullName(fp)}`:'Add someone to your tree';
  document.getElementById('rel-to-label').textContent=fp?(fp.firstName||fullName(fp)):'the tree';
  ['fn-first','fn-last','fdob-day','fdob-year','fcity','fstory','fdod-day','fdod-year'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  ['fdob-month','fgender','fr','fstate','fdod-month'].forEach(id=>{const e=document.getElementById(id);if(e)e.selectedIndex=0;});
  const dec=document.getElementById('f-deceased'); if(dec){dec.checked=false; toggleDeathDate();}
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){ document.getElementById('mbg').classList.remove('open'); }

function submitMember(){
  const first=document.getElementById('fn-first').value.trim();
  const last=document.getElementById('fn-last').value.trim();
  const name=[first,last].filter(Boolean).join(' ');
  if(!name){ document.getElementById('fn-first').focus(); return; }

  const gender=document.getElementById('fgender').value;
  const dob={
    month:document.getElementById('fdob-month').value,
    day:document.getElementById('fdob-day').value,
    year:document.getElementById('fdob-year').value
  };
  const birth=parseInt(dob.year)||null;
  const deceased=document.getElementById('f-deceased')?.checked;
  const dod=deceased?{month:document.getElementById('fdod-month')?.value||'',day:document.getElementById('fdod-day')?.value||'',year:document.getElementById('fdod-year')?.value||''}:null;
  const death=dod?parseInt(dod.year)||null:null;
  const city=document.getElementById('fcity').value.trim();
  const state=document.getElementById('fstate').value||'';
  const note=document.getElementById('fstory').value.trim();
  const rel=document.getElementById('fr').value;

  // Infer base rel category
  const baseRel=CHILD_RELS.includes(rel)?'Child':PARENT_RELS.includes(rel)?'Parent':SPOUSE_RELS.includes(rel)?'Spouse':SIBLING_RELS.includes(rel)?'Sibling':'Other';

  const id=`u${nxt++}`;
  const np={id,name,firstName:first,lastName:last,gender,dob,birth,dod,death,city,state,note,parents:[],relLabel:baseRel,x:600,y:400};

  // Infer gender from relationship label
  if(!np.gender){
    if(['Son','Grandson','Stepson','Nephew','Brother','Brother-in-law','Uncle','Father','Grandfather','Stepfather','Father-in-law','Husband'].includes(rel)) np.gender='male';
    if(['Daughter','Granddaughter','Stepdaughter','Niece','Sister','Sister-in-law','Aunt','Mother','Grandmother','Stepmother','Mother-in-law','Wife'].includes(rel)) np.gender='female';
  }

  if(addFor){
    const target=byId[addFor];
    if(baseRel==='Child') np.parents=[addFor];
    else if(baseRel==='Parent'){ np.parents=[]; if(target) target.parents=[...(target.parents||[]),id]; }
    else if(baseRel==='Sibling') np.parents=[...(target?.parents||[])];
    else if(baseRel==='Spouse'){ np.spouseOf=addFor; if(target) target.spouseOf=id; }
    else np.parents=[addFor];
  }

  P.push(np); rebuild(); closeModal(); render(); scheduleSave();
  setTimeout(()=>selectNode(id),90);
}
</script>
