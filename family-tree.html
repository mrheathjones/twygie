<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twygie</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#04070c;
  --border:rgba(255,255,255,0.09);
  --text:#ddd8cc;
  --muted:rgba(221,216,204,0.42);
  --gold:#c8a84b;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Outfit',sans-serif;color:var(--text)}

/* ── LOADING SCREEN ── */
#loading{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s;
}
#loading.fade{opacity:0;pointer-events:none}
#loading.gone{display:none}

.load-ring{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(200,168,75,.15);
  border-top-color:rgba(200,168,75,.7);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:.82rem;color:var(--muted);letter-spacing:.04em}

/* ── ATMOSPHERE ── */
#atm{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 58% 72% at 50% 56%,rgba(52,26,6,.70) 0%,transparent 100%),
    radial-gradient(ellipse 28% 32% at 50% 90%,rgba(18,8,2,.88) 0%,transparent 100%)}

#wrap{position:fixed;inset:0;z-index:1;cursor:grab;user-select:none}
#wrap.drag{cursor:grabbing}
#svg{width:100%;height:100%;overflow:visible}
#tg{transform-origin:0 0;will-change:transform}
#tg.anim{transition:transform .70s cubic-bezier(.4,0,.2,1)}

.br{fill:none;stroke-linecap:round;transition:opacity .3s}
.br.dim{opacity:.09}.br.lit{opacity:1}

.nd{cursor:pointer}
.nd .core{transition:transform .2s ease,opacity .3s;transform-origin:center}
.nd:hover .core{transform:scale(1.65)}
.nd.dim .core,.nd.dim .hi,.nd.dim .lbl{opacity:.16}
.nd.sel .core{transform:scale(1.8)}

@keyframes pa{0%,100%{opacity:.52;transform:scale(1)}50%{opacity:.88;transform:scale(1.2)}}
@keyframes pb{0%,100%{opacity:.42;transform:scale(1)}50%{opacity:.72;transform:scale(1.14)}}
@keyframes py{0%,100%{opacity:.58;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}
@keyframes pt{0%,100%{opacity:.48;transform:scale(1)}50%{opacity:.82;transform:scale(1.18)}}

.gp{transform-origin:center}
.gp.amber{animation:pa 3.3s ease-in-out infinite}
.gp.blue {animation:pb 4.2s ease-in-out infinite}
.gp.you  {animation:py 2.7s ease-in-out infinite}
.gp.teal {animation:pt 3.7s ease-in-out infinite}

.nlbl{font-family:'Outfit',sans-serif;font-size:10.5px;font-weight:400;
  letter-spacing:.03em;fill:rgba(221,216,204,.52);pointer-events:none;transition:opacity .3s}
.nlbl.you{font-weight:600;fill:rgba(240,239,235,.82);font-size:11px}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;
  align-items:center;justify-content:space-between;padding:16px 24px;
  background:linear-gradient(to bottom,rgba(4,7,12,.92) 0%,transparent 100%);
  pointer-events:none}
#hdr>*{pointer-events:all}

.logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;
  letter-spacing:.07em;color:var(--gold);display:flex;align-items:center;gap:9px}

#mcount{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  font-size:.78rem;color:var(--muted);letter-spacing:.03em}
#mcount strong{color:var(--text);font-weight:600}

.hbtns{display:flex;align-items:center;gap:8px}
.hbtn{padding:6px 15px;border-radius:100px;background:rgba(255,255,255,.05);
  border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;
  font-size:.78rem;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.hbtn:hover{background:rgba(200,168,75,.12);border-color:rgba(200,168,75,.28);color:var(--gold)}
.hbtn.acc{background:var(--gold);color:#04070c;border-color:transparent;font-weight:600}
.hbtn.acc:hover{background:#d4b454}

/* user avatar */
.uavatar{
  width:30px;height:30px;border-radius:50%;
  background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:600;color:var(--gold);
  cursor:pointer;position:relative;overflow:hidden;
}
.uavatar img{width:100%;height:100%;object-fit:cover}

/* save indicator */
#save-ind{
  font-size:.72rem;color:var(--muted);letter-spacing:.03em;
  opacity:0;transition:opacity .3s;
  display:flex;align-items:center;gap:5px;
}
#save-ind.show{opacity:1}
#save-ind svg{flex-shrink:0}

/* ── OVERLAY CARD ── */
#card{
  position:fixed;z-index:300;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.94);
  width:min(440px,90vw);max-height:min(580px,85vh);
  display:flex;flex-direction:column;border-radius:20px;
  background:rgba(6,12,22,.72);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  border:1px solid rgba(255,255,255,.13);
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 30px 70px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);
  opacity:0;pointer-events:none;
  transition:opacity .32s ease,transform .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#card.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}

.ctop{padding:26px 24px 18px;position:relative;border-bottom:1px solid rgba(255,255,255,.07)}
.ccls{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  color:rgba(221,216,204,.5);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.ccls:hover{background:rgba(255,255,255,.12);color:var(--text)}

.cbar{height:3px;border-radius:3px 3px 0 0;margin-bottom:18px;width:40px}
.cname{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;
  color:var(--text);line-height:1.15;margin-bottom:4px}
.cyrs{font-size:.82rem;color:var(--muted);margin-bottom:2px}
.cplace{font-size:.78rem;color:rgba(200,168,75,.62);font-style:italic}

.cbody{flex:1;overflow-y:auto;padding:16px 24px 20px}
.cbody::-webkit-scrollbar{width:2px}
.cbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.csec{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;
  color:var(--muted);margin-bottom:8px;margin-top:16px}
.csec:first-child{margin-top:0}
.cbio{font-size:.88rem;line-height:1.72;color:rgba(221,216,204,.74)}

.frow{display:flex;flex-wrap:wrap;gap:7px}
.fchip{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  cursor:pointer;transition:all .2s;flex:1;min-width:140px}
.fchip:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14)}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fi2{flex:1;min-width:0}
.fn2{font-size:.84rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frel{font-size:.68rem;color:var(--muted);font-style:italic}
.fyr{font-size:.72rem;color:var(--muted);flex-shrink:0}

.delbtn{margin-top:14px;padding:6px 13px;background:transparent;
  border:1px solid rgba(180,80,80,.25);border-radius:7px;
  color:rgba(200,100,100,.55);font-family:'Outfit',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s}
.delbtn:hover{border-color:rgba(200,100,100,.5);color:rgba(220,120,120,.9)}

#scrim{position:fixed;inset:0;z-index:299;pointer-events:none;
  background:rgba(4,7,12,0);transition:background .32s}
#scrim.on{background:rgba(4,7,12,.38);pointer-events:all}

/* ── ZOOM CONTROLS ── */
#zc{position:fixed;bottom:28px;left:28px;z-index:100;display:flex;flex-direction:column;gap:5px}
.zb{width:33px;height:33px;border-radius:50%;background:rgba(255,255,255,.05);
  border:1px solid var(--border);color:var(--text);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.zb:hover{background:rgba(200,168,75,.12);border-color:rgba(200,168,75,.28);color:var(--gold)}

/* ── LEGEND ── */
#leg{position:fixed;bottom:28px;right:28px;z-index:100;
  background:rgba(6,11,20,.82);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:12px;
  padding:11px 15px;font-size:.71rem;color:var(--muted)}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lr:last-child{margin-bottom:0}
.ld{width:7px;height:7px;border-radius:50%}

/* ── TOOLTIP ── */
#tip{position:fixed;z-index:500;pointer-events:none;
  padding:5px 11px;border-radius:7px;
  background:rgba(8,14,26,.97);border:1px solid var(--border);
  font-size:.78rem;color:var(--text);letter-spacing:.02em;
  opacity:0;transition:opacity .12s;white-space:nowrap;backdrop-filter:blur(8px)}
#tip.show{opacity:1}

/* ── ADD MEMBER MODAL ── */
#mbg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);
  backdrop-filter:blur(5px);opacity:0;pointer-events:none;
  transition:opacity .25s;display:flex;align-items:center;justify-content:center}
#mbg.open{opacity:1;pointer-events:all}
#modal{background:#08101e;border:1px solid rgba(255,255,255,.1);border-radius:16px;
  width:390px;max-width:92vw;padding:30px;box-shadow:0 30px 60px rgba(0,0,0,.55);
  transform:translateY(14px) scale(.97);transition:transform .25s}
#mbg.open #modal{transform:translateY(0) scale(1)}
.mt{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:600;color:var(--text);margin-bottom:3px}
.ms{font-size:.82rem;color:var(--muted);margin-bottom:20px}
.mf{margin-bottom:13px}
.ml{display:block;font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.mi{width:100%;padding:8px 11px;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.mi:focus{border-color:rgba(200,168,75,.42)}
.mr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;gap:9px;margin-top:18px;justify-content:flex-end}
.mcan{padding:7px 16px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.mcan:hover{color:var(--text);border-color:rgba(255,255,255,.14)}
.madd{padding:7px 18px;background:var(--gold);border:none;border-radius:8px;
  color:#04070c;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.madd:hover{background:#d4b454;transform:translateY(-1px)}
</style>
</head>
<body>

<div id="loading">
  <div class="load-ring"></div>
  <span class="load-txt">Loading your family tree…</span>
</div>

<div id="atm"></div>
<div id="scrim" onclick="closeCard()"></div>

<div id="hdr">
  <div class="logo">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/>
      <path d="M12 16C12 13 9 11 5 12"/><path d="M12 16C12 13 15 11 19 12"/>
    </svg>
    Twygie
  </div>

  <div id="mcount">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
      <path d="M17 11a3 3 0 1 0 0-6"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    </svg>
    <strong id="mcnum">0</strong>&nbsp;members
  </div>

  <div class="hbtns">
    <!-- save indicator -->
    <div id="save-ind">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      Saved
    </div>
    <button class="hbtn" onclick="resetView()">Fit to screen</button>
    <button class="hbtn acc" onclick="openModal(null)">+ Add member</button>
    <!-- user avatar + logout -->
    <div class="uavatar" id="uavatar" onclick="signOut()" title="Sign out">
      <span id="uinitial">?</span>
    </div>
  </div>
</div>

<div id="wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="gf-y" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b2"/>
        <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gf-a" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gf-b" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gf-t" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="tg"><g id="bG"></g><g id="nG"></g></g>
  </svg>
</div>

<div id="zc">
  <button class="zb" onclick="zoomBy(1.25)">+</button>
  <button class="zb" onclick="zoomBy(0.8)">−</button>
  <button class="zb" style="font-size:.68rem" onclick="resetView()">⊡</button>
</div>

<div id="leg">
  <div class="lr"><div class="ld" style="background:#f0efeb;box-shadow:0 0 5px #f0efeb"></div>You</div>
  <div class="lr"><div class="ld" style="background:#f0b845;box-shadow:0 0 5px #f0b845"></div>Living</div>
  <div class="lr"><div class="ld" style="background:#6b9ec2;box-shadow:0 0 5px #6b9ec2"></div>Deceased</div>
  <div class="lr"><div class="ld" style="background:#4ecdb4;box-shadow:0 0 5px #4ecdb4"></div>Young</div>
</div>

<div id="card">
  <div class="ctop">
    <button class="ccls" onclick="closeCard()">✕</button>
    <div class="cbar" id="cbar"></div>
    <div class="cname" id="cname"></div>
    <div class="cyrs"  id="cyrs"></div>
    <div class="cplace" id="cplace"></div>
  </div>
  <div class="cbody" id="cbody"></div>
</div>

<div id="tip"></div>

<div id="mbg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="mt">Add Family Member</div>
    <div class="ms" id="msub">Connect a new member to the tree</div>
    <div class="mf"><label class="ml">Full Name</label><input class="mi" id="fn" placeholder="First Last"/></div>
    <div class="mr2">
      <div class="mf"><label class="ml">Birth Year</label><input class="mi" id="fb" type="number" placeholder="e.g. 1952"/></div>
      <div class="mf"><label class="ml">Death Year</label><input class="mi" id="fd" type="number" placeholder="if applicable"/></div>
    </div>
    <div class="mf">
      <label class="ml">Relationship</label>
      <select class="mi" id="fr" style="appearance:none">
        <option>Child</option><option>Parent</option><option>Sibling</option>
        <option>Grandparent</option><option>Grandchild</option><option>Spouse / Partner</option><option>Other</option>
      </select>
    </div>
    <div class="mf"><label class="ml">Birthplace</label><input class="mi" id="fp" placeholder="City, Country"/></div>
    <div class="mf"><label class="ml">Story</label><textarea class="mi" id="fnt" rows="2" placeholder="A brief memory or note…" style="resize:vertical"></textarea></div>
    <div class="mfoot">
      <button class="mcan" onclick="closeModal()">Cancel</button>
      <button class="madd" onclick="submitMember()">Add to Tree</button>
    </div>
  </div>
</div>

<!-- ── Firebase SDK ── -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  FIREBASE CONFIG  —  paste your config from the Firebase console here
//  (same config as login.html)
// ══════════════════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── Default starter tree for new users ───────────────────────────────────────
const DEFAULT_TREE = [
  { id:'you', name:'Your Name', birth:null, death:null, place:'', parents:[], isYou:true,
    note:'Edit this to add your story.', x:584, y:400 }
];

// ── Auth guard ────────────────────────────────────────────────────────────────
let currentUser = null;
let saveTimer   = null;

auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = user;

  // Set avatar
  const initEl = document.getElementById('uinitial');
  const avatarEl = document.getElementById('uavatar');
  if (user.photoURL) {
    initEl.style.display = 'none';
    const img = document.createElement('img');
    img.src = user.photoURL;
    avatarEl.appendChild(img);
  } else {
    initEl.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
  }
  avatarEl.title = `${user.displayName || user.email} — click to sign out`;

  await loadTree();
  hideLoading();
});

async function signOut() {
  if (!confirm('Sign out?')) return;
  await auth.signOut();
  window.location.href = 'login.html';
}

// ── Firestore helpers ─────────────────────────────────────────────────────────
function userDoc() {
  return db.collection('familyTrees').doc(currentUser.uid);
}

async function loadTree() {
  try {
    const snap = await userDoc().get();
    if (snap.exists && snap.data().people && snap.data().people.length) {
      P = snap.data().people;
    } else {
      // First-time user — seed with default
      P = DEFAULT_TREE;
      await saveTree(false);
    }
  } catch(err) {
    console.warn('Could not load tree from Firestore:', err);
    P = DEFAULT_TREE;
  }
  rebuild();
  render();
  setTimeout(resetView, 90);
}

async function saveTree(showIndicator = true) {
  if (!currentUser) return;
  try {
    await userDoc().set({
      people: P,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      ownerEmail: currentUser.email || ''
    });
    if (showIndicator) flashSaved();
  } catch(err) {
    console.warn('Save failed:', err);
  }
}

// Debounced auto-save: waits 1.8s after last change before writing
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveTree(true), 1800);
}

function flashSaved() {
  const el = document.getElementById('save-ind');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(() => el.classList.add('gone'), 420);
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
let P = [];
let byId={};
function rebuild(){ byId={}; P.forEach(p=>byId[p.id]=p); updateCount(); }
function g(id){ return byId[id]; }
let nxt = Date.now(); // unique IDs

function updateCount(){
  document.getElementById('mcnum').textContent = P.length;
}

// ─── VISUAL HELPERS ───────────────────────────────────────────────────────────
function col(p){
  if(p.isYou)  return '#f0efeb';
  if(p.death)  return '#6b9ec2';
  if((p.birth||0)>=2000) return '#4ecdb4';
  return '#f0b845';
}
function gc(p){
  if(p.isYou)  return 'you';
  if(p.death)  return 'blue';
  if((p.birth||0)>=2000) return 'teal';
  return 'amber';
}
function gf(p){
  if(p.isYou)  return 'gf-y';
  if(p.death)  return 'gf-b';
  if((p.birth||0)>=2000) return 'gf-t';
  return 'gf-a';
}
function nr(p){ return p.isYou?11:8; }
function gr(p){ return p.isYou?26:20; }

function orb(a,b){
  const h=a.charCodeAt(0)*127+b.charCodeAt(0)*31+a.length*17;
  const v=Math.sin(h*.4531)*43758.5;
  return (v-Math.floor(v)-.5)*26;
}

const NS='http://www.w3.org/2000/svg';
function se(t){ return document.createElementNS(NS,t); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('bG').innerHTML='';
  document.getElementById('nG').innerHTML='';
  if(P.length>1){ drawTrunk(); drawBranches(); }
  drawNodes();
}

function drawTrunk(){
  const segs=[
    {d:'M 373 856 C 376 898 394 936 406 978 C 418 1018 436 1048 458 1082',w:21,o:.70},
    {d:'M 442 858 C 447 904 458 944 462 988 C 466 1022 460 1054 458 1082',w:13,o:.48},
    {d:'M 308 874 C 320 906 352 934 374 970 C 392 1000 424 1030 458 1082',w: 7,o:.28},
  ];
  const bG=document.getElementById('bG');
  segs.forEach(({d,w,o})=>{
    const p=se('path');
    p.setAttribute('d',d);
    p.setAttribute('stroke',`rgba(34,15,4,${o})`);
    p.setAttribute('stroke-width',w);
    p.setAttribute('class','br trunk');
    bG.insertBefore(p,bG.firstChild);
  });
}

function bstyle(py){
  if(py>780) return {w:10.5,o:.66};
  if(py>610) return {w: 7.0,o:.56};
  if(py>430) return {w: 4.8,o:.46};
               return {w: 3.0,o:.38};
}

function drawBranches(){
  const bG=document.getElementById('bG');
  P.forEach(child=>{
    (child.parents||[]).forEach(pid=>{
      const par=g(pid); if(!par)return;
      const {w,o}=bstyle(par.y);
      const ox=orb(pid,child.id);
      const r1=Math.abs(par.y-child.y)*.28;
      const r2=Math.abs(par.y-child.y)*.28;
      const d=`M ${par.x} ${par.y} C ${par.x+ox*.35} ${par.y-r1} ${child.x+ox*.2} ${child.y+r2} ${child.x} ${child.y}`;
      const path=se('path');
      path.setAttribute('d',d);
      path.setAttribute('stroke',`rgba(38,17,5,${o})`);
      path.setAttribute('stroke-width',w);
      path.setAttribute('class','br');
      path.dataset.src=pid; path.dataset.dst=child.id;
      bG.appendChild(path);
    });
  });
}

function drawNodes(){
  const nG=document.getElementById('nG');
  P.forEach(p=>{
    const G=se('g');
    G.setAttribute('class','nd');
    G.setAttribute('transform',`translate(${p.x},${p.y})`);
    G.dataset.id=p.id;

    const c=col(p),R=nr(p),GR=gr(p);
    const delay=((p.x*.05+p.y*.02)%3.5).toFixed(2);

    const halo=se('circle');
    halo.setAttribute('r',GR);halo.setAttribute('fill',c);halo.setAttribute('fill-opacity','.2');
    halo.setAttribute('filter',`url(#${gf(p)})`);
    halo.setAttribute('class',`gp hi ${gc(p)}`);
    halo.style.animationDelay=`-${delay}s`;

    const ring=se('circle');
    ring.setAttribute('r',R+4);ring.setAttribute('fill',c);ring.setAttribute('fill-opacity','.26');

    const core=se('circle');
    core.setAttribute('r',R);core.setAttribute('fill',c);core.setAttribute('class','core');

    const lbl=se('text');
    lbl.textContent=p.name.split(' ')[0];
    lbl.setAttribute('class',`nlbl lbl${p.isYou?' you':''}`);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('y',(R+14)+'');

    G.append(halo,ring,core,lbl);
    G.addEventListener('click',e=>{e.stopPropagation();selectNode(p.id);});
    G.addEventListener('mouseenter',e=>showTip(e,p));
    G.addEventListener('mouseleave',hideTip);
    nG.appendChild(G);
  });
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
let selId=null;

function selectNode(id){
  selId=id;
  const p=g(id); if(!p)return;
  hideTip();

  const conn=new Set([id]);
  (p.parents||[]).forEach(pid=>conn.add(pid));
  P.filter(x=>(x.parents||[]).includes(id)).forEach(x=>conn.add(x.id));
  const myP=new Set(p.parents||[]);
  P.filter(x=>x.id!==id&&(x.parents||[]).some(pp=>myP.has(pp))).forEach(x=>conn.add(x.id));

  document.querySelectorAll('.nd').forEach(n=>{
    n.classList.toggle('dim',!conn.has(n.dataset.id));
    n.classList.toggle('sel',n.dataset.id===id);
  });
  document.querySelectorAll('.br:not(.trunk)').forEach(b=>{
    const lit=conn.has(b.dataset.src)&&conn.has(b.dataset.dst);
    b.classList.toggle('dim',!lit);b.classList.toggle('lit',lit);
  });

  zoomTo(p); fillCard(p);
  document.getElementById('card').classList.add('open');
  document.getElementById('scrim').classList.add('on');
}

function zoomTo(p){
  const s=2.3;
  tx=window.innerWidth/2-p.x*s;
  ty=window.innerHeight/2-p.y*s;
  scale=s; applyT(true);
}

function fillCard(p){
  const c=col(p);
  const bar=document.getElementById('cbar');
  bar.style.background=c; bar.style.boxShadow=`0 0 12px ${c}`;
  document.getElementById('cname').textContent=p.name;
  document.getElementById('cyrs').textContent=
    p.birth?(p.death?`${p.birth} – ${p.death}`:`b. ${p.birth}`):'';
  document.getElementById('cplace').textContent=p.place||'';

  const parents=(p.parents||[]).map(pid=>({p:g(pid),rel:'Parent'})).filter(x=>x.p);
  const children=P.filter(x=>(x.parents||[]).includes(p.id)).map(x=>({p:x,rel:'Child'}));
  const myP=new Set(p.parents||[]);
  const sibs=P.filter(x=>x.id!==p.id&&(x.parents||[]).some(pp=>myP.has(pp))).map(x=>({p:x,rel:'Sibling'}));
  const conns=[...parents,...children,...sibs];

  let html='';
  if(p.note) html+=`<div class="csec">Story</div><p class="cbio">${p.note}</p>`;
  if(conns.length){
    html+=`<div class="csec">Immediate family</div><div class="frow">`;
    conns.forEach(({p:cp,rel})=>{
      const cc=col(cp);
      html+=`<div class="fchip" onclick="selectNode('${cp.id}')">
        <div class="fdot" style="background:${cc};box-shadow:0 0 6px ${cc}"></div>
        <div class="fi2"><div class="fn2">${cp.name}</div><div class="frel">${rel}</div></div>
        <div class="fyr">${cp.birth||''}</div></div>`;
    });
    html+=`</div>`;
  }
  if(!p.isYou) html+=`<button class="delbtn" onclick="removePerson('${p.id}')">Remove from tree</button>`;
  document.getElementById('cbody').innerHTML=html;
}

function closeCard(){
  document.getElementById('card').classList.remove('open');
  document.getElementById('scrim').classList.remove('on');
  selId=null;
  document.querySelectorAll('.nd').forEach(n=>n.classList.remove('dim','sel'));
  document.querySelectorAll('.br').forEach(b=>b.classList.remove('dim','lit'));
  resetView();
}

function removePerson(id){
  if(!confirm('Remove this person from the tree?'))return;
  const rm=new Set();
  function col2(pid){rm.add(pid);P.filter(x=>(x.parents||[]).includes(pid)).forEach(x=>col2(x.id));}
  col2(id);
  P=P.filter(p=>!rm.has(p.id));
  rebuild(); closeCard(); render();
  scheduleSave();
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
function showTip(e,p){
  if(selId)return;
  const t=document.getElementById('tip');
  t.textContent=`${p.name}${p.birth?` · ${p.birth}`:''}`;
  t.style.left=(e.clientX+13)+'px'; t.style.top=(e.clientY-12)+'px';
  t.classList.add('show');
}
function hideTip(){ document.getElementById('tip').classList.remove('show'); }

// ─── TRANSFORM ────────────────────────────────────────────────────────────────
let tx=0,ty=0,scale=1;

function applyT(anim=false){
  const tg=document.getElementById('tg');
  if(anim){tg.classList.add('anim');setTimeout(()=>tg.classList.remove('anim'),800);}
  tg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
}

function resetView(){
  if(!P.length)return;
  const xs=P.map(p=>p.x),ys=P.map(p=>p.y);
  const x0=Math.min(...xs)-70,x1=Math.max(...xs)+70;
  const y0=Math.min(...ys)-60,y1=Math.max(...ys)+145;
  const W=window.innerWidth,H=window.innerHeight;
  scale=Math.min(1,W/(x1-x0),(H-75)/(y1-y0))*.93;
  tx=(W-(x1-x0)*scale)/2-x0*scale;
  ty=(H-(y1-y0)*scale)/2-y0*scale+22;
  applyT(true);
}

function zoomBy(f){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  tx=cx-(cx-tx)*f; ty=cy-(cy-ty)*f;
  scale=Math.max(.18,Math.min(6,scale*f)); applyT();
}

// ─── PAN + PINCH ─────────────────────────────────────────────────────────────
let drag=false,dsx=0,dsy=0;
const wrap=document.getElementById('wrap');

wrap.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd'))return;
  drag=true;dsx=e.clientX-tx;dsy=e.clientY-ty;
  wrap.classList.add('drag');hideTip();
});
document.addEventListener('mousemove',e=>{if(!drag)return;tx=e.clientX-dsx;ty=e.clientY-dsy;applyT();});
document.addEventListener('mouseup',()=>{drag=false;wrap.classList.remove('drag');});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.11:.9;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;
  scale=Math.max(.15,Math.min(6,scale*f));applyT();
},{passive:false});

let ltD=0,tpan=false;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===1&&!e.target.closest('.nd')){
    tpan=true;dsx=e.touches[0].clientX-tx;dsy=e.touches[0].clientY-ty;
  } else if(e.touches.length===2){
    tpan=false;
    ltD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&tpan){tx=e.touches[0].clientX-dsx;ty=e.touches[0].clientY-dsy;applyT();}
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/ltD;ltD=d;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy2=(e.touches[0].clientY+e.touches[1].clientY)/2;
    tx=cx-(cx-tx)*f;ty=cy2-(cy2-ty)*f;
    scale=Math.max(.15,Math.min(6,scale*f));applyT();
  }
},{passive:true});
wrap.addEventListener('touchend',()=>{tpan=false;});

// ─── ADD MEMBER ───────────────────────────────────────────────────────────────
let addFor=null;

function openModal(forId){
  addFor=forId;
  const fp=forId?g(forId):null;
  document.getElementById('msub').textContent=
    fp?`Adding a relative of ${fp.name}`:'Connect a new member to the tree';
  ['fn','fb','fd','fp','fnt'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){ document.getElementById('mbg').classList.remove('open'); }

function submitMember(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const birth=parseInt(document.getElementById('fb').value)||null;
  const death=parseInt(document.getElementById('fd').value)||null;
  const place=document.getElementById('fp').value.trim();
  const note =document.getElementById('fnt').value.trim();

  let x=584,y=350;
  if(addFor){
    const par=g(addFor);
    if(par){
      const kids=P.filter(p=>(p.parents||[]).includes(addFor));
      const dir=kids.length%2===0?1:-1;
      x=par.x+dir*(100+kids.length*55);
      y=par.y-158;
    }
  }
  x+=(Math.random()-.5)*18;

  const np={id:`u${nxt++}`,name,birth,death,place,note,parents:addFor?[addFor]:[],x,y};
  P.push(np); rebuild();
  closeModal(); render();
  scheduleSave();
  setTimeout(()=>selectNode(np.id),90);
}
</script>
