<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twygie — Leafs</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/leafs.css">
</head>
<body>
<div id="atm" style="position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 58% 72% at 50% 46%,rgba(52,26,6,.65) 0%,transparent 100%),radial-gradient(ellipse 30% 35% at 50% 10%,rgba(10,5,2,.6) 0%,transparent 100%)"></div>
<div id="loading">Loading Leafs…</div>

<div id="hdr">
  <div class="logo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22V10"/><path d="M12 10C12 6 8 3.5 4 4.5"/><path d="M12 10C12 6 16 3.5 20 4.5"/><path d="M12 16C12 13 9 11 5 12"/><path d="M12 16C12 13 15 11 19 12"/></svg> Leafs</div>
  <div class="hdr-btns">
    <button class="hbtn new-leaf-btn" id="btn-new-leaf">+ New Leaf</button>
    <a class="hbtn" href="/app">← Back to Tree</a>
  </div>
</div>

<!-- FILTERS -->
<div id="filters">
  <input type="text" id="search" placeholder="Search leafs…" autocomplete="off"/>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div id="type-filters" style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="type-btn active" data-type="all">All</button>
      <button class="type-btn" data-type="story">📖 Stories</button>
      <button class="type-btn" data-type="moment">✨ Moments</button>
      <button class="type-btn" data-type="photo">📷 Photos</button>
      <button class="type-btn" data-type="quote">💬 Quotes</button>
      <button class="type-btn" data-type="milestone">🏆 Milestones</button>
    </div>
    <select id="twyg-filter" style="padding:5px 10px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.74rem;outline:none;cursor:pointer">
      <option value="">All Twygs</option>
    </select>
    <select id="sort-filter" style="padding:5px 10px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.74rem;outline:none;cursor:pointer">
      <option value="created-desc">Newest Created</option>
      <option value="created-asc">Oldest Created</option>
      <option value="modified-desc">Recently Modified</option>
      <option value="modified-asc">Least Recently Modified</option>
    </select>
  </div>
</div>

<!-- LEAF GRID -->
<div id="leaf-grid"></div>

<!-- EMPTY STATE -->
<div id="empty">
  <div style="font-size:2rem;margin-bottom:8px">🍃</div>
  <div>No Leafs yet.</div>
  <div style="font-size:.78rem;color:var(--muted);margin-top:4px">Add stories, moments, and quotes from the tree view.</div>
  <a class="hbtn" href="/app" style="margin-top:12px">← Back to Tree</a>
</div>

<!-- ADD LEAF MODAL -->
<div id="add-bg">
  <div id="add-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--text)">New Leaf</div>
      <button onclick="closeAddLeaf()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px">✕</button>
    </div>
    <div id="add-type-picker" style="display:flex;gap:4px;margin-bottom:14px"></div>
    <input id="add-title" placeholder="Title (optional)" style="width:100%;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.86rem;margin-bottom:10px;box-sizing:border-box;outline:none"/>
    <textarea id="add-content" placeholder="Write something…" style="width:100%;min-height:100px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.86rem;margin-bottom:10px;box-sizing:border-box;outline:none;resize:vertical"></textarea>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="number" id="add-year" placeholder="Year" min="1800" max="2030" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.84rem;outline:none"/>
      <select id="add-month" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.84rem;outline:none">
        <option value="">Month</option><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
      </select>
      <input type="number" id="add-day" placeholder="Day" min="1" max="31" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.84rem;outline:none"/>
    </div>
    <div style="font-size:.7rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Tag Twygs</div>
    <div id="add-twyg-tags" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px"></div>
    <div style="display:flex;gap:6px;margin-bottom:16px" id="add-emoji-row"></div>
    <button id="btn-submit-new-leaf" style="width:100%;padding:12px;border-radius:10px;background:rgba(100,180,100,.18);border:1px solid rgba(100,180,100,.35);color:rgba(140,210,140,.95);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer">Save Leaf</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-bg" style="position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center">
  <div style="width:360px;background:rgba(8,14,26,.97);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.5)">
    <div id="confirm-msg" style="font-size:.92rem;color:var(--text);margin-bottom:20px;line-height:1.5"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button id="confirm-cancel" style="padding:8px 20px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer">Cancel</button>
      <button id="confirm-ok" style="padding:8px 20px;border-radius:100px;background:rgba(200,80,80,.15);border:1px solid rgba(200,80,80,.3);color:rgba(220,100,100,.9);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer">Delete</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-bg">
  <div id="detail-card"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="js/leafs-page.js"></script>
</body>
</html>
